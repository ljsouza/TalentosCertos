<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MaringáPost Empregos — Protótipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Spectral:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
:root{
  --display:'Newsreader',Georgia,serif;
  --sans:'Archivo',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ink:#15171a; --ink-80:#3a3d42; --ink-60:#6b6f76; --ink-40:#9a9ea6;
  --paper:#faf9f6; --card:#ffffff; --line:#e7e4dd; --line-2:#f0ede7;
  --accent:#1f8a5b; --accent-2:#b8742a; --accent-glow:#1f8a5b1f;
  --ok:#1f8a5b; --warn:#b8742a;
  --shadow:0 1px 2px rgba(21,23,26,.04),0 8px 24px -12px rgba(21,23,26,.10);
  --shadow-lg:0 2px 4px rgba(21,23,26,.05),0 24px 60px -24px rgba(21,23,26,.22);
  --r:12px; --maxw:1240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
button:focus-visible,a:focus-visible,[role="switch"]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
ul{list-style:none}
.chapeu{font-family:var(--sans);font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.chapeu.light{color:rgba(255,255,255,.7)}
h1,h2,h3{font-family:var(--display);font-weight:600;line-height:1.08;letter-spacing:-.01em;color:var(--ink);text-wrap:balance}

/* ---------- Logo ---------- */
.logo{display:flex;flex-direction:column;align-items:flex-start;line-height:1;gap:3px;flex-shrink:0}
.logo-word{font-family:var(--display);font-weight:700;letter-spacing:.01em;color:inherit;white-space:nowrap;line-height:1}
.logo-vert{font-family:var(--sans);font-size:8.5px;font-weight:800;letter-spacing:.36em;text-transform:uppercase;color:var(--accent);padding-left:1px;line-height:1}

/* ---------- Top nav ---------- */
.topbar{position:sticky;top:0;z-index:40;background:var(--ink);color:#fff}
.topbar-inner{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:14px}
.topbar .logo-word{color:#fff}
.nav-links{display:flex;gap:1px;margin-left:2px}
.nav-links button{font-size:12.5px;font-weight:600;letter-spacing:.005em;color:rgba(255,255,255,.78);padding:8px 8px;border-radius:7px;transition:.15s;white-space:nowrap}
.nav-links button:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-links button.on{color:#fff}
.nav-cta{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-ghost{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap}
.nav-ghost:hover{color:#fff}
/* avatar dropdown */
.avatar-wrap{position:relative}
.avatar-btn{display:flex;align-items:center;gap:6px;padding:4px 8px 4px 5px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);cursor:pointer;transition:.14s}
.avatar-btn:hover{background:rgba(255,255,255,.16)}
.avatar-circle{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-size:12.5px;font-weight:700;letter-spacing:.02em;flex-shrink:0}
.avatar-circle.lg{width:42px;height:42px;font-size:15px}
.avatar-backdrop{position:fixed;inset:0;z-index:90}
.avatar-menu{position:absolute;top:calc(100% + 10px);right:0;z-index:91;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px;min-width:236px;box-shadow:0 12px 36px rgba(0,0,0,.16);animation:shareIn .15s ease}
.am-header{display:flex;align-items:center;gap:12px;padding:10px 12px 14px;border-bottom:1px solid var(--line-2);margin-bottom:6px}
.am-id{min-width:0}
.am-id strong{display:block;font-size:14.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.am-id span{font-size:12px;color:var(--ink-40)}
.am-item{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;color:var(--ink-80);cursor:pointer;transition:.12s;text-align:left}
.am-item svg{color:var(--ink-40);flex-shrink:0}
.am-item:hover{background:var(--line-2)}
.am-sep{height:1px;background:var(--line-2);margin:6px 4px}
.am-out{color:#b3261e}
.am-out svg{color:#b3261e}
.am-out:hover{background:#fbeaea}
.m-out{color:#ff6b6b!important}
.burger{display:none;font-size:22px;color:#fff;margin-left:auto}
.nav-mobile{display:none;flex-direction:column;background:var(--ink);padding:8px 24px 18px;gap:2px}
.nav-mobile button{text-align:left;color:rgba(255,255,255,.85);padding:11px 4px;font-size:15px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-mobile .m-prim{color:var(--accent)}

/* ---------- Menu button + Mega drawer ---------- */
.menu-btn{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;width:38px;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);transition:.15s}
.menu-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.menu-btn-bars{display:flex;flex-direction:column;gap:3.5px;width:17px}
.menu-btn-bars span{display:block;height:2px;border-radius:2px;background:currentColor}
.menu-btn-bars span:nth-child(2){width:72%}
.mm-overlay{position:fixed;inset:0;z-index:120;background:rgba(21,23,26,.5);animation:shareIn .16s ease}
.mm-drawer{position:fixed;top:0;left:0;bottom:0;width:380px;max-width:90vw;background:var(--card);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.25);animation:mmIn .22s cubic-bezier(.22,.61,.36,1)}
@keyframes mmIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.mm-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-2);flex-shrink:0}
.mm-head-title{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink)}
.mm-x{width:34px;height:34px;display:grid;place-items:center;font-size:24px;line-height:1;color:var(--ink-40);border-radius:50%;transition:.14s}
.mm-x:hover{background:var(--line-2);color:var(--ink)}
.mm-body{flex:1;overflow-y:auto;padding:14px 16px 8px}
.mm-group{margin-bottom:18px}
.mm-group-title{font-family:var(--sans);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-40);padding:0 8px;margin-bottom:8px}
.mm-items{display:flex;flex-direction:column;gap:2px}
.mm-item{display:flex;align-items:center;gap:13px;width:100%;padding:11px 10px;border-radius:11px;text-align:left;transition:.14s}
.mm-item:hover{background:var(--paper)}
.mm-item.on{background:var(--accent-glow)}
.mm-ic{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;background:var(--line-2);color:var(--ink-80);flex-shrink:0;transition:.14s}
.mm-item:hover .mm-ic,.mm-item.on .mm-ic{background:var(--accent);color:#fff}
.mm-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.mm-txt strong{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2}
.mm-txt small{font-size:12.5px;color:var(--ink-60);line-height:1.3}
.mm-arrow{color:var(--ink-40);flex-shrink:0;opacity:0;transform:translateX(-4px);transition:.16s}
.mm-item:hover .mm-arrow,.mm-item.on .mm-arrow{opacity:1;transform:translateX(0);color:var(--accent)}
.mm-foot{flex-shrink:0;display:flex;flex-direction:column;gap:8px;padding:14px 18px 18px;border-top:1px solid var(--line-2);background:var(--paper)}
.mm-foot-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:14px;font-weight:600;color:var(--ink-80);transition:.14s}
.mm-foot-btn svg{color:var(--ink-40)}
.mm-foot-btn:hover{border-color:var(--ink-40)}
.mm-foot-btn.prim{background:var(--accent);color:#fff;border-color:var(--accent)}
.mm-foot-btn.prim svg{color:#fff}
.mm-foot-btn.prim:hover{filter:brightness(1.08)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-weight:600;font-size:14.5px;padding:11px 18px;border-radius:9px;transition:.16s;white-space:nowrap}
.btn-sm{padding:8px 13px;font-size:13.5px;border-radius:8px}
.btn-full{width:100%}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{filter:brightness(1.4)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--ink-40);background:#fff}
.icon-btn{display:grid;place-items:center;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);color:var(--ink-60);transition:.15s}
.icon-btn:hover,.icon-btn.on{border-color:var(--accent);color:var(--accent)}
.link{color:var(--accent);font-weight:600;font-size:inherit;text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}
.link:hover{filter:brightness(.9)}

/* ---------- Chips & badges ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:100px;background:var(--line-2);color:var(--ink-80)}
.chip-type{background:#fff;border:1px solid var(--line)}
.badge-responde{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:4px 9px;border-radius:100px}
.feat-flag{position:absolute;top:0;left:16px;display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--accent-2);padding:4px 10px 5px;border-radius:0 0 8px 8px;z-index:1;pointer-events:none}

.match-lock{position:relative;display:grid;place-items:center;flex-shrink:0;opacity:.45}
.match-lock-lg{position:relative;display:grid;place-items:center;flex-shrink:0;opacity:.5}
.match-lock-lg svg{position:absolute;inset:0}
.apply-match-locked{opacity:.8}
.match-cta{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0;background:var(--card);border:1.5px dashed var(--line);border-radius:12px;padding:7px 10px;cursor:pointer;transition:.16s;min-width:72px;text-align:center}
.match-cta:hover{border-color:var(--accent);background:var(--accent-glow)}
.match-cta-icon{font-size:16px;font-weight:800;font-family:var(--display);color:var(--ink-40);line-height:1}
.match-cta:hover .match-cta-icon{color:var(--accent)}
.match-cta-label{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-40);line-height:1.2;white-space:nowrap}
.match-cta:hover .match-cta-label{color:var(--accent)}
.match-ring{position:relative;display:grid;place-items:center;flex-shrink:0}
.match-ring svg{position:absolute;inset:0}
.match-num{font-family:var(--sans);font-weight:800;font-size:13px}

/* ---------- Company mark ---------- */
.co-mark{display:grid;place-items:center;border-radius:10px;font-family:var(--display);font-weight:700;flex-shrink:0;background:oklch(0.94 0.04 calc(var(--tint-h,150)));color:oklch(0.42 0.1 calc(var(--tint-h,150)));background:color-mix(in oklab,var(--accent) 8%,#fff);border:1px solid var(--line)}
.co-mark{background:linear-gradient(135deg,#fff,#f3f1ec);color:var(--ink-80);text-transform:uppercase}

/* ---------- Layout ---------- */
.main{min-height:60vh}
.screen{max-width:var(--maxw);margin:0 auto;padding:0 24px}

/* ---------- Hero ---------- */
.hero{max-width:var(--maxw);margin:0 auto;padding:48px 24px 32px;display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-inner{display:flex;flex-direction:column;align-items:center;width:100%}
.hero-title{font-size:clamp(38px,5vw,60px);font-weight:700;margin:14px 0 16px;letter-spacing:-.02em}
.hero-sub{font-size:18px;color:var(--ink-60);max-width:34em;margin-bottom:26px;line-height:1.5}
.searchbar{display:flex;gap:10px;background:var(--card);padding:8px;border-radius:14px;box-shadow:var(--shadow);border:1px solid var(--line);max-width:720px;width:100%}
.sb-field{display:flex;align-items:center;gap:9px;padding:0 12px;color:var(--ink-40);border-radius:9px}
.sb-field.grow{flex:1}
.sb-field input,.sb-field select{border:none;outline:none;background:none;width:100%;padding:11px 0;font-weight:500}
.sb-field select{cursor:pointer}
.searchbar .btn{padding:11px 22px}
.hero-stats{display:flex;align-items:center;gap:14px;margin-top:22px;font-size:14px;color:var(--ink-60);justify-content:center;flex-wrap:wrap}
.hero-stats strong{color:var(--ink);font-weight:700}
.hero-stats .dot{width:4px;height:4px;border-radius:50%;background:var(--ink-40)}
.hero-side .radar-card{background:var(--ink);color:#fff;border-radius:var(--r);padding:26px;box-shadow:var(--shadow-lg)}
.radar-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--accent);margin-bottom:10px}
.radar-card p{color:rgba(255,255,255,.78);font-size:14.5px;margin-bottom:18px;line-height:1.5}
.radar-note{display:block;text-align:center;font-size:12px;color:rgba(255,255,255,.5);margin-top:12px}
/* radar no painel do candidato */
.radar-panel{background:var(--ink);color:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.radar-panel-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;color:var(--accent);margin-bottom:9px}
.radar-panel.on .radar-panel-head{color:#fff}
.radar-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in oklab,var(--accent) 35%,transparent);flex-shrink:0}
.radar-panel-sub{color:rgba(255,255,255,.78);font-size:13.5px;line-height:1.5;margin-bottom:16px}
.radar-panel-sub strong{color:#fff}
.radar-activate{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:11px;border-radius:9px;cursor:pointer;transition:.15s}
.radar-activate:hover{filter:brightness(1.08)}
.radar-activate:disabled{opacity:.45;cursor:not-allowed;filter:none}
.radar-off{display:block;width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-weight:600;font-size:13px;padding:9px;border-radius:9px;cursor:pointer;transition:.15s}
.radar-off:hover{background:rgba(255,255,255,.18)}
.radar-form{display:flex;flex-direction:column;gap:14px;margin-bottom:6px}
.radar-field{display:flex;flex-direction:column;gap:5px}
.radar-field>span{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.02em}
.radar-field input{padding:10px 12px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;outline:none;transition:.14s}
.radar-field input:focus{border-color:var(--accent);background:rgba(255,255,255,.1)}
.radar-field input::placeholder{color:rgba(255,255,255,.4)}
.radar-field small{font-size:11px;color:var(--accent);font-weight:600}
.radar-consent{display:flex;align-items:flex-start;gap:9px;cursor:pointer}
.radar-consent input{margin-top:3px;width:16px;height:16px;flex-shrink:0;accent-color:var(--accent);cursor:pointer}
.radar-consent span{font-size:11.5px;line-height:1.5;color:rgba(255,255,255,.62)}
.radar-consent strong{color:rgba(255,255,255,.85)}
.radar-panel-note{display:block;text-align:center;font-size:11.5px;color:rgba(255,255,255,.45);margin-top:14px}

/* ---------- Area rail ---------- */
.area-rail{max-width:var(--maxw);margin:0 auto;padding:6px 24px 8px;display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:100px;border:1px solid var(--line);background:#fff;color:var(--ink-80);transition:.15s;white-space:nowrap}
.pill:hover{border-color:var(--ink-40)}
.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ---------- Results ---------- */
.results-wrap{max-width:var(--maxw);margin:0 auto;padding:24px 24px 64px;display:grid;grid-template-columns:1fr 332px;gap:36px}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.results-count{font-size:24px;font-weight:600;white-space:nowrap}
.sort{display:flex;align-items:center;gap:6px;font-size:13.5px;color:var(--ink-60)}
.sort button{font-weight:600;color:var(--ink-60);padding:6px 11px;border-radius:7px}
.sort button.on{background:var(--ink);color:#fff}
.job-grid{display:grid;gap:16px}
.job-grid.regular{grid-template-columns:repeat(2,1fr)}
.job-grid.compact{grid-template-columns:1fr}

/* ---------- Job card ---------- */
.jobcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:13px}
.jobcard:hover{border-color:var(--ink-40);box-shadow:var(--shadow);transform:translateY(-2px)}
.jobcard.is-feat{border-color:color-mix(in oklab,var(--accent-2) 40%,var(--line));padding-top:42px}.jobcard.compact.is-feat{padding-top:38px}
.jc-top{display:flex;gap:13px;align-items:flex-start}
.jc-headings{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.jc-title{font-size:19px;font-weight:600;line-height:1.18;margin:0}
.jc-co{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:600;color:var(--ink-60);margin:0}
.jc-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--ink-60)}
.jc-meta span{display:inline-flex;align-items:center;gap:5px}
.jc-desc{font-size:14px;color:var(--ink-80);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.jc-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.jc-sal{font-family:var(--display);font-size:17px;font-weight:600;color:var(--ink);white-space:nowrap}
.jc-chips{display:flex;gap:6px;flex-wrap:wrap}
.jc-actions{display:flex;align-items:center;gap:10px;padding-top:13px;border-top:1px solid var(--line-2)}
.jc-spacer{flex:1}
.jobcard.compact{padding:16px;gap:10px}
.jobcard.compact .jc-title{font-size:16px}

/* ---------- Section head ---------- */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px}
.sec-title{font-size:22px;font-weight:600;margin-top:3px}

/* ---------- Aside ---------- */
.results-aside{display:flex;flex-direction:column;gap:20px}
.aside-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.aside-arts{display:flex;flex-direction:column}
.aside-art{text-align:left;padding:13px 0;border-top:1px solid var(--line-2);display:flex;flex-direction:column;gap:4px}
.aside-art:first-child{border-top:none;padding-top:0}
.aside-art-chapeu{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.aside-art-title{font-family:var(--display);font-size:16px;font-weight:600;line-height:1.2;color:var(--ink)}
.aside-art:hover .aside-art-title{color:var(--accent)}
.aside-art-meta{font-size:12px;color:var(--ink-40)}
.cta-card{background:var(--ink);color:#fff;border:none}
.cta-card h3{color:#fff;font-size:19px;margin-bottom:8px}
.cta-card p{font-size:14px;color:rgba(255,255,255,.74);margin-bottom:16px}

/* ---------- Mini map ---------- */
.minimap{position:relative;width:100%;aspect-ratio:16/11;border-radius:10px;overflow:hidden;background:#f1efe9;border:1px solid var(--line);display:block;margin-top:4px}
.minimap-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:26px 26px;opacity:.7}
.map-pin{position:absolute;transform:translate(-50%,-50%);min-width:26px;height:26px;padding:0 6px;display:grid;place-items:center;background:var(--accent);color:#fff;font-size:12px;font-weight:800;border-radius:100px;box-shadow:0 3px 8px -2px rgba(0,0,0,.3);border:2px solid #fff}
.minimap-cap{position:absolute;left:10px;bottom:10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:#fff;padding:5px 10px;border-radius:100px;box-shadow:var(--shadow)}

/* ---------- Image placeholder ---------- */
.ph{width:100%;background:repeating-linear-gradient(45deg,#f2f0ea,#f2f0ea 9px,#edeae3 9px,#edeae3 18px);display:grid;place-items:center;border:1px solid var(--line)}
.ph-label{font-family:var(--mono);font-size:11.5px;color:var(--ink-40);background:rgba(255,255,255,.7);padding:3px 8px;border-radius:5px}

/* ---------- Detail ---------- */
.detail{padding-top:24px;padding-bottom:72px}
.back{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-60);margin-bottom:20px;white-space:nowrap}
.back:hover{color:var(--ink)}
.detail-grid{display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start}
.detail-head{display:flex;gap:18px;align-items:flex-start;margin-bottom:18px}
.detail-co{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink-60)}
.verif{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-size:12px;font-weight:700}
.detail-title{font-size:clamp(28px,3.4vw,40px);font-weight:700;margin:5px 0 12px;letter-spacing:-.015em}
.detail-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13.5px;color:var(--ink-60)}
.detail-meta span{display:inline-flex;align-items:center;gap:6px}
.detail-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:8px}
.detail-block{padding:24px 0;border-bottom:1px solid var(--line-2)}
.detail-block h2{font-size:21px;font-weight:600;margin-bottom:12px}
.detail-block p{color:var(--ink-80);font-size:15.5px;line-height:1.6;max-width:62ch}
.check-list{display:flex;flex-direction:column;gap:10px}
.check-list li{display:flex;align-items:flex-start;gap:10px;font-size:15px;color:var(--ink-80)}
.check-list svg{color:var(--accent);margin-top:3px;flex-shrink:0}
.benefits{display:flex;flex-wrap:wrap;gap:9px}
.benefit{font-size:13.5px;font-weight:600;padding:8px 14px;background:#fff;border:1px solid var(--line);border-radius:9px}
/* apply card */
.detail-aside{position:sticky;top:88px;display:flex;flex-direction:column;gap:14px}
.apply-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:13px;box-shadow:var(--shadow)}
.apply-match{display:flex;align-items:center;gap:13px}
.apply-match strong{display:block;font-size:15px}
.apply-match span{font-size:13px;color:var(--ink-60)}
.apply-sal{font-family:var(--display);font-size:24px;font-weight:600;padding-bottom:6px;border-bottom:1px solid var(--line-2)}
.applied-ok{display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:14px;border-radius:10px}
.save-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink-60);padding:10px;border:1px solid var(--line);border-radius:9px;transition:.15s}
.save-row:hover,.save-row.on{color:var(--accent);border-color:var(--accent)}
.apply-note{font-size:12.5px;color:var(--ink-60);line-height:1.5;text-align:center}
.co-aside{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;width:100%;text-align:left;cursor:pointer;transition:.15s}
.co-aside:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.co-aside strong{display:block;font-size:14.5px}
.co-aside span{font-size:12.5px;color:var(--ink-60)}

/* ---------- Conteúdo ---------- */
.content{padding-top:40px;padding-bottom:72px}
.content-masthead{text-align:center;max-width:720px;margin:0 auto 36px;padding-bottom:30px;border-bottom:2px solid var(--ink)}
.content-masthead h1{font-size:clamp(32px,4.5vw,52px);font-weight:700;margin:12px 0}
.content-masthead p{font-size:17px;color:var(--ink-60)}
.feature-art{display:grid;grid-template-columns:1.3fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;margin-bottom:32px;background:#fff}
.feature-art:hover{box-shadow:var(--shadow)}
.feature-art .ph{border:none;border-right:1px solid var(--line)}
.feature-img{width:100%;height:100%;min-height:280px;object-fit:cover;border-right:1px solid var(--line);display:block}
.art-img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:8px;margin-bottom:5px;display:block}
.artigo-hero-img{width:100%;aspect-ratio:21/10;object-fit:cover;border-radius:10px;display:block;margin:8px 0}
.feature-body{padding:34px;display:flex;flex-direction:column;justify-content:center;gap:12px}
.feature-body h2{font-size:30px;font-weight:700}
.feature-body p{color:var(--ink-60);font-size:16px}
.byline{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--ink-40);text-transform:uppercase;letter-spacing:.04em}
.art-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.art-card{display:flex;flex-direction:column;gap:9px;cursor:pointer}
.art-card .ph{margin-bottom:5px;border-radius:8px}
.art-card h3{font-size:20px;font-weight:600;line-height:1.2}
.art-card:hover h3{color:var(--accent)}
.art-card p{font-size:14px;color:var(--ink-60);line-height:1.5}
.art-card.promo{background:var(--ink);color:#fff;border-radius:var(--r);padding:28px;justify-content:center;cursor:default}
.art-card.promo h3{color:#fff}
.art-card.promo p{color:rgba(255,255,255,.74);margin-bottom:8px}

/* ---------- Auth ---------- */
.auth{max-width:1080px;margin:0 auto;padding:36px 24px}
.auth-split{display:grid;grid-template-columns:.85fr 1fr;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);min-height:600px}
.auth-aside{background:var(--ink);color:#fff;padding:34px;display:flex;flex-direction:column;justify-content:space-between}
.auth-aside.co{background:#15171a}
.auth-aside .logo-word{color:#fff}
.auth-aside-body{margin:auto 0}
.auth-aside h2{color:#fff;font-size:30px;font-weight:700;margin:14px 0 22px;line-height:1.12}
.auth-points{display:flex;flex-direction:column;gap:13px}
.auth-points li{display:flex;align-items:flex-start;gap:10px;font-size:14.5px;color:rgba(255,255,255,.82)}
.auth-points svg{color:var(--accent);flex-shrink:0;margin-top:2px}
.auth-logos{display:flex;align-items:center;gap:8px;margin-top:26px;font-size:13px;color:rgba(255,255,255,.6)}
.auth-foot{font-family:var(--display);font-style:italic;font-size:13px;color:rgba(255,255,255,.5)}
.auth-form{padding:40px 44px;display:flex;flex-direction:column;justify-content:center}
.auth-toggle{display:flex;gap:4px;background:var(--line-2);padding:4px;border-radius:10px;margin-bottom:28px}
.auth-toggle button{flex:1;padding:9px;font-weight:600;font-size:14px;border-radius:7px;color:var(--ink-60)}
.auth-toggle button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
.steps{display:flex;gap:8px;margin-bottom:26px}
.step{flex:1;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ink-40);padding-top:12px;border-top:2px solid var(--line)}
.step b{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--line);color:var(--ink-60);font-size:12px}
.step.on{color:var(--ink);border-top-color:var(--accent)}
.step.on b{background:var(--accent);color:#fff}
.step.done{color:var(--ink-60);border-top-color:var(--accent)}
.step.done b{background:var(--accent);color:#fff}

/* ---------- Forms ---------- */
.form{display:flex;flex-direction:column;gap:15px}
.form h1{font-size:28px;font-weight:700}
.form-sub{font-size:14.5px;color:var(--ink-60);margin-top:-8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:12.5px;font-weight:600;color:var(--ink-80)}
.field-label i{color:var(--accent);font-style:normal}
.field input,.field select,.field textarea{padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;transition:.15s;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-foot{font-size:13px;color:var(--ink-60);text-align:center}
.form-actions{display:flex;gap:12px;margin-top:4px}
.form-actions .btn{flex:1}
.forgot{align-self:flex-end;font-size:12.5px;margin-top:-8px}
/* dropzone */
.dropzone{display:block;border:2px dashed var(--line);border-radius:12px;padding:34px 20px;text-align:center;cursor:pointer;transition:.15s;background:#fcfbf9}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-glow)}
.dropzone.has{border-style:solid;border-color:var(--accent)}
.drop-empty{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink-60)}
.drop-empty svg{color:var(--accent)}
.drop-empty strong{font-size:15px;color:var(--ink)}
.drop-empty span{font-size:13px}
.file-on{display:flex;align-items:center;gap:13px;text-align:left}
.file-on svg:first-child{color:var(--ink-60)}
.file-on strong{display:block;font-size:14.5px}
.file-on span{font-size:12.5px;color:var(--ink-60)}
.file-on div{flex:1}
.or-row{display:flex;align-items:center;text-align:center;color:var(--ink-40);font-size:12px}
.or-row::before,.or-row::after{content:"";flex:1;height:1px;background:var(--line)}
.or-row span{padding:0 12px}
.ghost-wide{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1px solid var(--line);border-radius:9px;font-weight:600;font-size:14px;color:var(--ink-80);transition:.15s}
.ghost-wide:hover{border-color:var(--ink-40)}
.done-form{align-items:center;text-align:center}
.done-mark{display:grid;place-items:center;width:74px;height:74px;border-radius:50%;background:var(--accent-glow);color:var(--accent);margin-bottom:6px}
.done-actions{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px}

/* ---------- Panel ---------- */
.panel{padding-top:34px;padding-bottom:72px}
.panel-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.panel-head h1{font-size:34px;font-weight:700;margin-top:4px}
.prof-strength{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 16px}
.prof-strength strong{display:block;font-size:13.5px}
.prof-strength span{font-size:12px;color:var(--ink-60)}
.panel-actions{display:flex;align-items:center;gap:12px}
.plan-badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 10%,#fff);padding:7px 13px;border-radius:100px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.kpi-icon{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;background:var(--accent-glow);color:var(--accent);margin-bottom:11px}
.kpi strong{display:block;font-family:var(--display);font-size:30px;font-weight:700;line-height:1}
.kpi-l{font-size:12.5px;color:var(--ink-60);margin-top:3px;display:block}
.panel-cols{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start}
.panel-col.narrow{}
.apps{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.app-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line-2);text-align:left}
.app-row:last-child{border-bottom:none}
.app-row strong{display:block;font-size:14px}
.app-row span{font-size:12.5px;color:var(--ink-60)}
.link-row{cursor:pointer}.link-row:hover{background:#fcfbf9}
.app-st{font-size:12px;font-weight:700;padding:5px 10px;border-radius:100px;background:var(--line-2);color:var(--ink-60);white-space:nowrap}
.app-st.ok{background:var(--accent-glow);color:var(--accent)}
.app-st.warn{background:color-mix(in oklab,var(--warn) 12%,#fff);color:var(--warn)}

/* company panel */
.panel-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.panel-tabs button{font-weight:600;font-size:14px;color:var(--ink-60);padding:11px 16px;border-bottom:2px solid transparent;margin-bottom:-1px}
.panel-tabs button.on{color:var(--ink);border-bottom-color:var(--accent)}
.tab-new{font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--accent);padding:2px 6px;border-radius:5px;vertical-align:middle;margin-left:3px}
.vag-table{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.vt-head,.vt-row{display:grid;grid-template-columns:2fr 1fr .9fr 1.1fr 1.2fr .6fr;align-items:center;gap:12px;padding:14px 18px}
.vt-head{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-40);background:#fcfbf9;border-bottom:1px solid var(--line)}
.vt-row{border-bottom:1px solid var(--line-2)}
.vt-row:last-child{border-bottom:none}
.vt-title strong{display:block;font-size:14.5px}
.vt-title span{font-size:12px;color:var(--ink-60)}
.vt-cand{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:14px}
.vt-st{font-size:12px;font-weight:700;padding:5px 11px;border-radius:100px;justify-self:start}
.vt-st.live{background:var(--accent-glow);color:var(--accent)}
.vt-st.feat{background:color-mix(in oklab,var(--accent-2) 12%,#fff);color:var(--accent-2)}
.vt-bar{height:7px;background:var(--line-2);border-radius:100px;overflow:hidden}
.vt-bar span{display:block;height:100%;background:var(--accent);border-radius:100px}
.cand-list{display:flex;flex-direction:column;gap:12px}
.cand-card{display:flex;align-items:flex-start;gap:15px;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.cand-av{display:grid;place-items:center;width:46px;height:46px;border-radius:50%;background:var(--ink);color:#fff;font-weight:700;font-size:15px;flex-shrink:0;margin-top:2px}
.cand-info{flex:1}
.cand-info strong{display:block;font-size:15px}
.cand-info span{font-size:12.5px;color:var(--ink-60)}
.cand-match{display:flex;align-items:center;gap:9px}
.cand-match span{font-size:11px;font-weight:600;line-height:1.25;color:var(--ink-60);text-align:left}

/* ---------- AI features ---------- */
.ai-badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--accent-glow);padding:5px 11px;border-radius:100px}
/* cadastro: source cards */
.src-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.src-card{display:flex;flex-direction:column;align-items:flex-start;gap:5px;text-align:left;padding:18px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:.15s}
.src-card:hover{border-color:var(--ink-40)}
.src-card.on{border-color:var(--accent);background:var(--accent-glow)}
.src-card strong{font-size:15px}
.src-card span{font-size:12.5px;color:var(--ink-60)}
.src-ic{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;background:var(--line-2);color:var(--ink-80);margin-bottom:4px}
.src-ic.li{background:#0a66c2;color:#fff}
.src-panel{margin-top:2px}
.li-row{display:flex;gap:10px;align-items:stretch}
.li-field{border:1px solid var(--line);border-radius:9px;background:#fff}
.li-field input{padding:11px 0}
.li-imported{display:flex;align-items:center;gap:13px;background:var(--accent-glow);border-radius:11px;padding:14px 16px}
.li-imported strong{display:block;font-size:14.5px}
.li-imported span{font-size:12.5px;color:var(--ink-60)}
/* AI test */
.ai-test{display:flex;flex-direction:column;gap:18px}
.ai-test-head h1{font-size:26px;font-weight:700;margin-top:10px}
.ai-q{display:flex;flex-direction:column;gap:9px}
.ai-q-label{font-size:13.5px;font-weight:600;color:var(--ink-80)}
.ai-q-label i{font-style:normal;font-weight:500;color:var(--ink-40)}
.ai-opts{display:flex;flex-direction:column;gap:8px}
.ai-opts.grid-2{display:grid;grid-template-columns:1fr 1fr}
.ai-opt{text-align:left;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14px;font-weight:500;transition:.14s}
.ai-opt:hover{border-color:var(--ink-40)}
.ai-opt.on{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);font-weight:600}
.chip-pick{display:flex;flex-wrap:wrap;gap:8px}
.pick{font-size:13px;font-weight:600;padding:8px 14px;border-radius:100px;border:1px solid var(--line);background:#fff;color:var(--ink-80);transition:.14s}
.pick:hover{border-color:var(--ink-40)}
.pick.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ai-hint{font-size:12px;color:var(--ink-40);text-align:center}
/* analyzing */
.ai-analyzing{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;min-height:440px}
.ai-analyzing h2{font-size:24px;font-weight:700}
.ai-analyzing p{font-size:14.5px;color:var(--ink-60);max-width:36ch}
.ai-orb{display:flex;gap:10px}
.ai-orb span{width:16px;height:16px;border-radius:50%;background:var(--accent);animation:bounce 1s ease-in-out infinite}
.ai-orb span:nth-child(2){animation-delay:.15s;background:var(--accent-2)}
.ai-orb span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-14px);opacity:1}}
/* AI result */
.ai-result{background:var(--accent-glow);border:1px solid color-mix(in oklab,var(--accent) 30%,var(--line));border-radius:14px;padding:22px;text-align:left;width:100%}
.ai-arch{font-size:24px;font-weight:700;margin:5px 0 6px}
.ai-result p{font-size:14px;color:var(--ink-80)}
.ai-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.ai-tag{font-size:12px;font-weight:600;padding:5px 11px;border-radius:100px;background:#fff;border:1px solid var(--line);color:var(--ink-80)}
.ai-tag.soft{background:var(--accent);color:#fff;border-color:var(--accent)}
.ai-src-note{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-60);margin-top:16px;padding-top:14px;border-top:1px solid color-mix(in oklab,var(--accent) 20%,var(--line))}
/* AI profile card (painel) */
.ai-profile-card{display:grid;grid-template-columns:1fr 280px;gap:24px;background:var(--ink);color:#fff;border-radius:16px;padding:26px 28px;margin-bottom:28px}
.ai-profile-card .ai-badge{background:rgba(31,138,91,.2)}
.ai-profile-card h2{color:#fff;font-size:26px;font-weight:700;margin:12px 0 6px}
.ai-profile-card .apc-left>p{font-size:14.5px;color:rgba(255,255,255,.72);max-width:48ch}
.ai-profile-card .ai-tag{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:#fff}
.ai-profile-card .ai-tag.soft{background:var(--accent);border-color:var(--accent)}
.apc-right{border-left:1px solid rgba(255,255,255,.14);padding-left:24px;display:flex;flex-direction:column;justify-content:center;gap:12px}
.apc-right p{font-size:14px;color:rgba(255,255,255,.8);line-height:1.5}
.apc-right .link{color:var(--accent);align-self:flex-start}
/* candidate breakdown (empresa) */
.ai-rank-banner{display:flex;align-items:center;gap:16px;background:var(--accent-glow);border:1px solid color-mix(in oklab,var(--accent) 22%,var(--line));border-radius:12px;padding:14px 18px;margin-bottom:4px}
.ai-rank-banner p{font-size:13.5px;color:var(--ink-80);line-height:1.45}
.cand-bd{display:flex;gap:16px;margin-top:9px;flex-wrap:wrap}
.bd-item{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-60)}
.bd-item>span{white-space:nowrap}
.bd-bar{width:64px;height:6px;background:var(--line-2);border-radius:100px;overflow:hidden}
.bd-bar span{display:block;height:100%;background:var(--accent);border-radius:100px}
.bd-item b{color:var(--ink);font-size:11.5px;min-width:18px}
.cand-acts{align-items:flex-end}
.src-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap}
.src-tag.linkedin{background:#0a66c2;color:#fff}
.src-tag.pdf{background:var(--line-2);color:var(--ink-60)}

/* ---------- Artigo (leitura) + Vagas Contextuais ---------- */
.artigo{padding-top:28px;padding-bottom:72px}
.artigo-body{max-width:760px;margin:0 auto}
.artigo-body h1{font-size:clamp(30px,4vw,44px);font-weight:700;margin:10px 0 14px;letter-spacing:-.015em}
.artigo-lead{font-family:var(--display);font-size:20px;color:var(--ink-60);line-height:1.45;margin-bottom:18px}
.artigo-byline{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-60);padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:22px}
.artigo-byline strong{color:var(--ink)}
.dot-sep{color:var(--ink-40)}
.artigo-text{margin-top:26px}
.artigo-text>p{font-family:var(--display);font-size:18.5px;line-height:1.65;color:var(--ink-80);margin-bottom:22px}
.artigo-end{max-width:760px;margin:8px auto 0}
/* native ads widget */
.njads{border:1px solid color-mix(in oklab,var(--accent) 28%,var(--line));border-radius:14px;background:color-mix(in oklab,var(--accent) 4%,#fff);overflow:hidden}
.njads.mid{margin:30px 0}
.njads-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-bottom:1px solid color-mix(in oklab,var(--accent) 16%,var(--line))}
.njads-label{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.njads-tag{font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-40)}
.njads-list{display:flex;flex-direction:column}
.njads-row{display:flex;align-items:center;gap:13px;text-align:left;padding:14px 18px;border-bottom:1px solid color-mix(in oklab,var(--accent) 10%,var(--line-2));transition:.14s;background:transparent}
.njads-row:last-child{border-bottom:none}
.njads-row:hover{background:color-mix(in oklab,var(--accent) 7%,#fff)}
.njads-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.njads-info strong{font-family:var(--display);font-size:16.5px;font-weight:600;color:var(--ink);line-height:1.2}
.njads-info>span{font-size:12.5px;color:var(--ink-60)}
.njads-go{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
.njads-foot{font-size:11.5px;color:var(--ink-40);padding:11px 18px;border-top:1px solid color-mix(in oklab,var(--accent) 10%,var(--line-2))}

/* ---------- Radar de Talentos (consumo de conteúdo) ---------- */
.tr-wrap{display:flex;flex-direction:column;gap:18px}
.tr-intro{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;align-items:start}
.tr-intro h3{font-size:22px;font-weight:600;margin:10px 0 6px}
.tr-intro p{font-size:14.5px;color:var(--ink-60);line-height:1.5;max-width:56ch}
.tr-lgpd{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-80);background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;line-height:1.5}
.tr-lgpd svg{color:var(--accent);flex-shrink:0;margin-top:1px}
.tr-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--ink-60)}
.tr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tr-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:14px}
.tr-top{display:flex;align-items:flex-start;gap:11px}
.tr-anon{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:repeating-linear-gradient(45deg,var(--line-2),var(--line-2) 4px,var(--line) 4px,var(--line) 8px);color:var(--ink-60);flex-shrink:0}
.tr-id{flex:1;min-width:0}
.tr-id strong{display:block;font-size:14px}
.tr-id span{font-size:11.5px;color:var(--ink-60)}
.tr-reads{display:flex;flex-direction:column;gap:8px}
.tr-read{display:flex;align-items:center;gap:9px;font-size:12px}
.tr-read-tema{width:78px;flex-shrink:0;color:var(--ink-80);font-weight:600}
.tr-read-bar{flex:1;height:7px;background:var(--line-2);border-radius:100px;overflow:hidden}
.tr-read-bar span{display:block;height:100%;background:var(--accent);border-radius:100px}
.tr-read b{width:32px;text-align:right;font-size:11.5px}
.tr-meta{display:flex;flex-wrap:wrap;gap:6px}
.tr-foot{margin-top:auto}
.tr-sent{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--accent);background:var(--accent-glow);padding:10px;border-radius:9px;text-align:center}
.tr-note{font-size:13px;color:var(--ink-60);text-align:center;padding-top:6px}
/* candidate reading profile */
.rp-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:24px}
.rp-card .tr-reads{margin:4px 0 16px}
.rp-optin{display:flex;align-items:flex-start;gap:12px;text-align:left;width:100%;padding:13px;border:1px solid var(--line);border-radius:11px;background:#fcfbf9;transition:.15s}
.rp-optin:hover{border-color:var(--ink-40)}
.rp-optin .switch{margin-top:2px}
.rp-optin-txt strong{display:block;font-size:13px}
.rp-optin-txt span{font-size:12px;color:var(--ink-60);line-height:1.45;display:block;margin-top:2px}

/* ---------- Score de Intencionalidade ---------- */
.cand-name-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.intent-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;white-space:nowrap}
.intent-badge.alta{background:var(--accent-glow);color:var(--accent)}
.intent-badge.media{background:color-mix(in oklab,var(--accent-2) 13%,#fff);color:var(--accent-2)}
.intent-badge.explor{background:var(--line-2);color:var(--ink-60)}
.intent-block{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.intent-resumo{font-size:13px;color:var(--ink-80);line-height:1.5;font-style:italic;font-family:var(--display);max-width:58ch}
.intent-toggle{font-size:12px;font-weight:700;color:var(--accent);margin-top:6px;text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}
.intent-toggle:hover{filter:brightness(.85)}
.intent-signals{display:flex;flex-direction:column;gap:7px;margin-top:10px;background:var(--accent-glow);border-radius:10px;padding:12px 14px}
.intent-signals li{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ink-80);line-height:1.45}
.intent-signals svg{color:var(--accent);flex-shrink:0;margin-top:2px}

/* ---------- Filtros de candidatos ---------- */
.cand-toolbar{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px 18px 18px;margin-bottom:16px;display:flex;flex-direction:column;gap:14px}
.cand-toolbar-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.cand-count{font-size:14.5px;color:var(--ink-60)}
.cand-count b{font-family:var(--display);font-size:18px;font-weight:700;color:var(--ink)}
.cand-sort{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--ink-60);flex-wrap:wrap}
.cand-sort button{font-weight:600;color:var(--ink-60);padding:6px 11px;border-radius:7px;font-size:13px;transition:.14s}
.cand-sort button:hover{color:var(--ink)}
.cand-sort button.on{background:var(--ink);color:#fff}
.cand-filter-grid{display:flex;flex-wrap:wrap;gap:18px 30px;padding-top:15px;border-top:1px solid var(--line-2)}
.cf-group{display:flex;flex-direction:column;gap:9px;min-width:0}
.cf-group.cf-grow{flex:1;min-width:220px;max-width:340px}
.cf-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40)}
.cf-pills{display:flex;gap:7px;flex-wrap:wrap}
.cf-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:100px;border:1px solid var(--line);background:#fff;color:var(--ink-80);transition:.14s;white-space:nowrap}
.cf-pill:hover{border-color:var(--ink-40)}
.cf-pill svg{opacity:.85}
.cf-pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cf-pill .cf-n{font-size:11px;font-weight:800;opacity:.5;font-family:var(--sans)}
.cf-pill.on .cf-n{opacity:.85}
.cf-pill.alta.on{background:var(--accent);border-color:var(--accent)}
.cf-pill.media.on{background:var(--accent-2);border-color:var(--accent-2)}
.cf-slider{display:flex;flex-direction:column;gap:11px}
.cf-slider-val{font-family:var(--display);font-size:20px;font-weight:700;color:var(--ink);line-height:1}
.cf-slider-val span{font-size:12.5px;font-family:var(--sans);font-weight:600;color:var(--ink-60)}
.cf-slider-val .any{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink-60)}
.cf-range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:100px;background:var(--line-2);outline:none;cursor:pointer}
.cf-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.28);cursor:pointer}
.cf-range::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.28);cursor:pointer}
.cf-clear{align-self:flex-start;font-size:12.5px;display:inline-flex;align-items:center;gap:5px}
.cand-empty{display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;padding:52px 20px;background:#fff;border:1px dashed var(--line);border-radius:var(--r);color:var(--ink-60)}
.cand-empty-ic{display:grid;place-items:center;width:46px;height:46px;border-radius:50%;background:var(--line-2);color:var(--ink-40)}
.cand-empty strong{font-family:var(--display);font-size:19px;color:var(--ink);font-weight:600}
.cand-empty p{font-size:13.5px;max-width:36ch;line-height:1.5}

/* ---------- Candidatos por vaga (seleção / status) ---------- */
.vt-feat-tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 12%,#fff);padding:2px 8px;border-radius:100px;margin-left:8px;vertical-align:middle}
.vt-st.open{background:var(--accent-glow);color:var(--accent)}
.vt-st.closed{background:var(--line-2);color:var(--ink-60)}
.vag-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.vag-toolbar .cf-label{margin:0}
.vag-empty{padding:32px 18px;text-align:center;font-size:13.5px;color:var(--ink-60)}
.vc{display:flex;flex-direction:column;gap:16px}
.vc .back{margin-bottom:0}
.vc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.vc-head-info .chapeu{display:block;margin-bottom:4px}
.vc-head-info h2{font-size:24px;font-weight:600}
.vc-head-meta{display:flex;align-items:center;gap:8px 14px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--ink-60)}
.vc-head-meta span{display:inline-flex;align-items:center;gap:6px}
.vc-summary{display:flex;gap:10px;flex-wrap:wrap}
.vc-sum{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-60);background:#fff;border:1px solid var(--line);border-radius:100px;padding:6px 14px}
.vc-sum b{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink)}
.vc-sum.sel b{color:var(--accent)}
.vc-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#fcfbf9;border:1px solid var(--line);border-radius:11px;padding:11px 15px}
.vc-finalize{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--accent-glow);border:1px solid color-mix(in oklab,var(--accent) 35%,var(--line));border-radius:11px;padding:13px 16px;margin-bottom:14px;animation:waCardIn .2s ease}
.vc-finalize-txt{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink-80);line-height:1.4}
.vc-finalize-txt>svg{color:var(--accent);flex-shrink:0}
.vc-finalize-txt strong{color:var(--ink)}
.vc-finalize-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:#fff;background:var(--accent);border-radius:9px;padding:9px 16px;cursor:pointer;white-space:nowrap;transition:.14s;flex-shrink:0}
.vc-finalize-btn:hover{filter:brightness(1.08)}
.vc-bar.active{background:var(--accent-glow);border-color:color-mix(in oklab,var(--accent) 30%,var(--line))}
.vc-checkall{display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.vc-batch{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.vc-batch>span{font-size:13px;color:var(--ink-80);font-weight:700}
.vc-apply-final{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fff;background:var(--ink);border:1px solid var(--ink);border-radius:9px;padding:7px 14px;cursor:pointer;transition:.14s;white-space:nowrap;margin-left:auto}
.vc-apply-final:hover{background:var(--accent);border-color:var(--accent)}
.vc-bar-hint{font-size:13px;color:var(--ink-40)}
input.vc-check,.vc-checkall input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin:0}
.vc-list{display:flex;flex-direction:column;gap:10px}
.vc-row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;transition:.14s}
.vc-row.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.vc-info{flex:1;min-width:0}
.vc-info strong{display:block;font-size:15px}
.vc-info span{font-size:12.5px;color:var(--ink-60)}
.vc-st{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:100px;white-space:nowrap}
.vc-st.sel{background:var(--accent-glow);color:var(--accent)}
.vc-st.nao{background:color-mix(in oklab,#b3261e 10%,#fff);color:#b3261e}
.vc-st.analise{background:var(--line-2);color:var(--ink-60)}
.vc-acts{display:flex;gap:7px}
.vc-act{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);color:var(--ink-60);transition:.14s}
.vc-act:hover{border-color:var(--ink-40)}
.vc-act.sel.on{background:var(--accent);border-color:var(--accent);color:#fff}
.vc-act.nao.on{background:#b3261e;border-color:#b3261e;color:#fff}

/* ---------- Filtro de Resposta Ativa ---------- */
.chip-arf{background:var(--ink);color:#fff;border:none}
.arf-gate-note{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ink-80);background:var(--line-2);border-radius:9px;padding:10px 12px;line-height:1.45}
.arf-gate-note svg{flex-shrink:0;margin-top:1px;color:var(--ink)}
.arf{display:flex;flex-direction:column;gap:12px}
.arf-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.arf-head .link{font-size:12.5px}
.arf-pergunta{font-family:var(--display);font-size:18px;font-weight:600;line-height:1.3;color:var(--ink)}
.arf-sub{font-size:12.5px;color:var(--ink-60);line-height:1.5}
.arf-stage{background:var(--ink);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.arf-cam{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;aspect-ratio:16/10;color:rgba(255,255,255,.55)}
.arf-cam-live{color:#ff5a4e;font-weight:800;font-size:13px;letter-spacing:.08em;animation:blink 1.1s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}
.arf-cam-label{font-size:11.5px;color:rgba(255,255,255,.5)}
.arf-wave{display:flex;align-items:center;gap:3px;height:54px}
.arf-wave span{flex:1;background:rgba(255,255,255,.18);border-radius:100px;transition:.3s}
.arf-wave span.live{background:var(--accent);animation:wavePulse .9s ease-in-out infinite alternate}
.arf-wave span.full{background:var(--accent)}
@keyframes wavePulse{from{transform:scaleY(.4)}to{transform:scaleY(1.1)}}
.arf-timer{display:flex;align-items:center;gap:10px}
.arf-timer-bar{flex:1;height:6px;background:rgba(255,255,255,.15);border-radius:100px;overflow:hidden}
.arf-timer-bar span{display:block;height:100%;background:var(--accent);border-radius:100px;transition:width 1s linear}
.arf-timer-num{font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.75)}
.arf-rec-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:12px;border-radius:10px;background:#b3261e;color:#fff;font-weight:700;font-size:14.5px;transition:.15s}
.arf-rec-btn:hover{filter:brightness(1.08)}
.arf-rec-btn.recording{background:var(--ink)}
.arf-dot{width:11px;height:11px;border-radius:50%;background:#fff;animation:blink 1.1s steps(2) infinite}
.arf-square{width:11px;height:11px;border-radius:2px;background:#ff5a4e}
.arf-done{display:flex;flex-direction:column;gap:10px}
.arf-preview{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;background:var(--accent-glow);color:var(--accent);padding:11px 14px;border-radius:9px}
.arf-done-acts{display:flex;gap:9px}
.arf-done-acts .btn{flex:1}
.arf-note{display:flex;align-items:flex-start;gap:7px;font-size:11.5px;color:var(--ink-40);line-height:1.45}
.arf-note svg{flex-shrink:0;margin-top:1px}
/* parametro na publicação da vaga */
.arf-param strong{display:flex;align-items:center;gap:7px}
.arf-param span:not(.switch){max-width:52ch;line-height:1.45;display:block;margin-top:3px}
.arf-config{display:flex;flex-direction:column;gap:14px;background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:11px;padding:18px}
.arf-formats{display:flex;flex-direction:column;gap:7px}
.arf-format-opts{display:flex;gap:8px;flex-wrap:wrap}
.arf-fmt{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;border:1.5px solid var(--line);background:#fff;color:var(--ink-80);transition:.14s}
.arf-fmt:hover{border-color:var(--ink-40)}
.arf-fmt.on{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.arf-config-note{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ink-60);line-height:1.5}
.arf-config-note svg{color:var(--accent);flex-shrink:0;margin-top:2px}
.resp-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#fff;background:var(--ink);padding:5px 11px;border-radius:100px;white-space:nowrap;cursor:pointer}
.resp-chip:hover{background:var(--accent)}
.cand-acts{display:flex;gap:8px}
.nova-vaga{max-width:720px}
.feat-toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fcfbf9;border:1px solid var(--line);border-radius:11px;padding:15px 18px}
.feat-toggle strong{display:block;font-size:14.5px}
.feat-toggle span:not(.switch){font-size:12.5px;color:var(--ink-60)}
.switch{width:42px;height:24px;border-radius:100px;background:var(--line);position:relative;flex-shrink:0;transition:.15s}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--accent)}
.switch.on::after{left:21px}

/* ---------- Pacotes ---------- */
.pacotes{padding-top:48px;padding-bottom:72px}
.pacotes-head{text-align:center;max-width:680px;margin:0 auto 44px}
.pacotes-head h1{font-size:clamp(30px,4vw,46px);font-weight:700;margin:12px 0}
.pacotes-head p{font-size:16px;color:var(--ink-60)}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start}
.plan{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 26px;display:flex;flex-direction:column;gap:14px}
.plan.feat{border:2px solid var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-6px)}
.plan-flag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 14px;border-radius:100px}
.plan h3{font-size:22px;font-weight:700}
.plan-price{display:flex;align-items:baseline;gap:3px;font-family:var(--display)}
.plan-price .cur{font-size:18px;font-weight:600;color:var(--ink-60)}
.plan-price strong{font-size:46px;font-weight:700;line-height:1}
.plan-price .per{font-size:14px;color:var(--ink-60);font-family:var(--sans)}
.plan-price .consult{font-size:30px;white-space:nowrap}
.plan-vagas{font-size:13.5px;font-weight:700;color:var(--accent);padding-bottom:14px;border-bottom:1px solid var(--line-2)}
.plan ul{display:flex;flex-direction:column;gap:11px;flex:1}
.plan li{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:var(--ink-80)}
.plan li svg{color:var(--accent);flex-shrink:0;margin-top:3px}
.pacotes-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:920px;margin:52px auto 0;padding-top:36px;border-top:1px solid var(--line)}
.pf-item{display:flex;gap:13px;align-items:flex-start}
.pf-item svg{color:var(--accent);flex-shrink:0;margin-top:2px}
.pf-item strong{display:block;font-size:15px;margin-bottom:3px}
.pf-item span{font-size:13.5px;color:var(--ink-60);line-height:1.45}

/* ---------- Footer ---------- */
.footer{background:var(--ink);color:#fff;margin-top:40px}
.footer-inner{max-width:var(--maxw);margin:0 auto;padding:48px 24px 36px;display:grid;grid-template-columns:1.4fr 2fr;gap:48px}
.footer .logo-word{color:#fff}
.footer-brand p{font-size:14px;color:rgba(255,255,255,.62);margin:16px 0 12px;line-height:1.55;max-width:34em}
.footer-tag{font-family:var(--display);font-style:italic;font-size:14px;color:rgba(255,255,255,.45)}
.footer-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.footer-cols h4{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px}
.footer-cols button{display:block;text-align:left;font-size:14px;color:rgba(255,255,255,.8);padding:5px 0}
.footer-cols button:hover{color:#fff}
.footer-base{border-top:1px solid rgba(255,255,255,.1);padding:18px 24px;text-align:center;font-size:12.5px;color:rgba(255,255,255,.4)}

/* ---------- Tone variant ---------- */
.tone-Direto .hero-title{font-family:var(--sans);font-weight:800;letter-spacing:-.03em}

/* ---------- Diferencial: Alcance / Vaga Amplificada ---------- */
.alc-show{max-width:var(--maxw);margin:0 auto;padding:64px 24px 24px}
.alc-head{text-align:center;max-width:760px;margin:0 auto 32px}
.alc-head h2{font-size:clamp(28px,3.8vw,44px);font-weight:700;margin:12px 0 14px}
.alc-head p{font-size:16.5px;color:var(--ink-60);line-height:1.55}
.alc-reach-banner{display:flex;align-items:center;gap:32px;background:var(--ink);color:#fff;border-radius:16px;padding:28px 34px;margin-bottom:32px}
.arb-num strong{display:block;font-family:var(--display);font-size:52px;font-weight:700;line-height:1;color:var(--accent)}
.arb-num span{font-size:14px;color:rgba(255,255,255,.7)}
.arb-div{width:1px;align-self:stretch;background:rgba(255,255,255,.16)}
.arb-pts{display:flex;flex-direction:column;gap:10px}
.arb-pts span{display:flex;align-items:center;gap:9px;font-size:14.5px;color:rgba(255,255,255,.85)}
.arb-pts svg{color:var(--accent);flex-shrink:0}
.alc-channels{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:34px}
.alc-chan{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:13px}
.alc-chan-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--ink)}
.alc-chan-ic{display:grid;place-items:center;width:30px;height:30px;border-radius:8px;background:var(--accent-glow);color:var(--accent);flex-shrink:0}
.alc-chan-reach{font-size:12.5px;color:var(--ink-60);margin-top:auto}
.alc-chan-reach strong{font-family:var(--display);font-size:18px;color:var(--ink);font-weight:700}
/* channel mocks */
.cmock{border:1px solid var(--line);border-radius:9px;overflow:hidden;height:130px;background:#fcfbf9;display:flex;flex-direction:column}
.cm-line{height:7px;border-radius:4px;background:var(--line)}
.cm-line.w90{width:90%}.cm-line.w80{width:80%}.cm-line.w70{width:70%}.cm-line.w60{width:60%}.cm-line.w55{width:55%}.cm-line.w50{width:50%}
.cm-tag{display:inline-block;font-size:8px;font-weight:800;letter-spacing:.08em;background:var(--accent-2);color:#fff;padding:2px 6px;border-radius:3px}
.cm-tag.green{background:var(--accent)}
.cmock-home .cm-bar{display:flex;align-items:center;justify-content:space-between;background:var(--ink);color:#fff;padding:6px 9px;font-family:var(--display);font-size:9px;font-weight:700}
.cmock-home .cm-bar span{font-family:var(--sans);font-size:6px;letter-spacing:.2em;color:var(--accent)}
.cm-feat{padding:9px;display:flex;flex-direction:column;gap:5px;border-bottom:1px solid var(--line-2)}
.cm-rows{padding:9px;display:flex;flex-direction:column;gap:6px}
.cmock-news .cm-news-head{display:flex;align-items:center;justify-content:space-between;padding:8px 9px;border-bottom:1px solid var(--line-2);font-family:var(--display);font-size:11px}
.cmock-news .cm-news-head span{font-family:var(--sans);font-size:8px;color:var(--ink-40)}
.cm-news-block{padding:10px 9px;display:flex;flex-direction:column;gap:6px}
.cm-cta{font-size:9px;font-weight:700;color:var(--accent);margin-top:2px}
.cmock-zap{background:#e7f0e9}
.cm-zap-head{display:flex;align-items:center;gap:6px;background:#1f8a5b;color:#fff;padding:7px 9px;font-size:10px;font-weight:700}
.cm-zap-dot{width:8px;height:8px;border-radius:50%;background:#fff}
.cm-bubble{margin:9px;background:#fff;border-radius:8px;padding:9px;display:flex;flex-direction:column;gap:5px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.cm-bubble b{font-size:9.5px}
.cm-zap-link{font-size:8px;color:var(--accent);margin-top:2px}
.cmock-insta .cm-insta-head{display:flex;align-items:center;gap:6px;padding:7px 9px;font-size:10px;font-weight:700}
.cm-insta-av{width:16px;height:16px;border-radius:50%;background:linear-gradient(45deg,var(--accent-2),var(--accent))}
.cm-insta-img{flex:1;background:repeating-linear-gradient(45deg,#eceae4,#eceae4 7px,#e6e3db 7px,#e6e3db 14px);display:flex;align-items:flex-start;padding:8px}
.cm-insta-foot{display:flex;justify-content:space-between;padding:6px 9px;font-size:9px;color:var(--ink-60)}
.alc-tier{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px}
.alc-tier-row{display:flex;align-items:center;gap:16px}
.atr-label{width:96px;font-size:13.5px;font-weight:700;flex-shrink:0}
.alc-tier-row.pro .atr-label{color:var(--accent)}
.alc-tier-row.corp .atr-label{color:var(--accent-2)}
.atr-bar{flex:1;height:12px;background:var(--line-2);border-radius:100px;overflow:hidden}
.atr-bar span{display:block;height:100%;background:var(--ink-40);border-radius:100px}
.alc-tier-row.pro .atr-bar span{background:var(--accent)}
.alc-tier-row.corp .atr-bar span{background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.atr-val{width:230px;font-size:12.5px;color:var(--ink-60);flex-shrink:0;text-align:right}
.plan-amp{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:5px 10px;border-radius:7px;align-self:flex-start}
/* alcance panel */
.alc-panel-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:22px;align-items:start}
.alc-big{background:var(--ink);color:#fff;border-radius:14px;padding:26px}
.alc-big .chapeu{color:var(--accent)}
.alc-big-num{font-family:var(--display);font-size:60px;font-weight:700;line-height:1;margin:8px 0 4px;font-variant-numeric:tabular-nums}
.alc-big-sub{font-size:14px;color:rgba(255,255,255,.7)}
.alc-mult{display:inline-flex;align-items:center;gap:7px;background:rgba(31,138,91,.18);color:var(--accent);font-size:13.5px;font-weight:600;padding:8px 13px;border-radius:9px;margin:18px 0 22px}
.alc-mult strong{font-size:16px}
.alc-chan-list{display:flex;flex-direction:column;gap:13px;border-top:1px solid rgba(255,255,255,.1);padding-top:18px}
.alc-chan-line{display:flex;align-items:center;gap:12px}
.acl-name{display:flex;align-items:center;gap:7px;width:170px;font-size:13px;color:rgba(255,255,255,.82);flex-shrink:0}
.acl-bar{flex:1;height:8px;background:rgba(255,255,255,.12);border-radius:100px;overflow:hidden}
.acl-bar span{display:block;height:100%;background:var(--accent);border-radius:100px}
.acl-val{width:34px;text-align:right;font-size:13px;font-weight:700;color:#fff}
.alc-side{display:flex;flex-direction:column;gap:18px}
.alc-card,.bench-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
.origem-list{display:flex;flex-direction:column;gap:12px}
.origem-row{display:flex;align-items:center;gap:12px;font-size:13px}
.origem-row span:first-child{width:120px;flex-shrink:0;color:var(--ink-80)}
.origem-bar{flex:1;height:9px;background:var(--line-2);border-radius:100px;overflow:hidden}
.origem-bar span{display:block;height:100%;border-radius:100px}
.origem-row b{width:24px;text-align:right;font-size:13px}
.origem-foot{margin-top:16px;padding-top:14px;border-top:1px solid var(--line-2);font-size:13px;color:var(--ink-60)}
.origem-foot strong{color:var(--ink);font-size:15px}
.acc-em{color:var(--accent);font-weight:700}
.bench-card h4{font-family:var(--display);font-size:18px;font-weight:600;margin:6px 0 16px}
.bench-track{position:relative;height:10px;background:linear-gradient(90deg,#e7f0e9,var(--accent-glow),color-mix(in oklab,var(--accent-2) 18%,#fff));border-radius:100px;margin-bottom:6px}
.bench-you,.bench-avg{position:absolute;top:-22px;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap}
.bench-you{color:var(--accent)}.bench-you::after,.bench-avg::after{content:"";position:absolute;left:50%;top:16px;width:2px;height:9px;transform:translateX(-50%)}
.bench-you::after{background:var(--accent)}
.bench-avg{color:var(--accent-2)}.bench-avg::after{background:var(--accent-2)}
.bench-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-40);margin-top:10px}
.bench-note{font-size:13px;color:var(--ink-80);line-height:1.5;margin-top:14px;display:flex;gap:7px}
.bench-note svg{color:var(--accent-2);flex-shrink:0;margin-top:2px}

/* ---------- Partners banner ---------- */
.partners{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff;overflow:hidden}
.partners-inner{max-width:var(--maxw);margin:0 auto;padding:30px 24px;display:flex;align-items:center;gap:32px}
.partners-label{display:flex;flex-direction:column;font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);white-space:nowrap;flex-shrink:0;line-height:1.6}
.partners-label i{font-style:normal;font-weight:600;letter-spacing:.02em;text-transform:none;font-size:12.5px;color:var(--accent)}
.partners-track-wrap{flex:1;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
.partners-track{display:flex;gap:20px;width:max-content;animation:marquee 38s linear infinite}
.partners-track-wrap:hover .partners-track{animation-play-state:paused}
@keyframes marquee{to{transform:translateX(-50%)}}
.partner{display:flex;align-items:center;gap:15px;flex-shrink:0;font-size:16px;font-weight:700;color:var(--ink);white-space:nowrap;background:#fff;border:1px solid var(--line);border-radius:15px;padding:12px 22px 12px 12px;transition:.16s}
.partner:hover{border-color:var(--ink-40);box-shadow:var(--shadow)}
.partner image-slot{width:60px;height:60px;flex-shrink:0;border:1px solid var(--line-2);border-radius:12px;background:#fff}
.partner{cursor:pointer}
.partner-slot{display:inline-flex;flex-shrink:0}
.partner-name{display:inline-flex;align-items:center;gap:7px}
.partner-name .partner-go{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--line-2);color:var(--ink-60);transition:.15s}
.partner:hover .partner-go{background:var(--accent);color:#fff}

/* ---------- Página institucional da empresa ---------- */
.emp-perfil{padding-top:24px;padding-bottom:72px}
.emp-hero{display:flex;align-items:center;gap:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;flex-wrap:wrap}
.emp-hero .co-mark{border-radius:16px}
.emp-hero-body{flex:1;min-width:240px}
.emp-hero-co{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.emp-hero-co h1{font-size:clamp(26px,3.2vw,36px);font-weight:700;letter-spacing:-.015em}
.emp-hero-setor{font-size:14.5px;color:var(--ink-60);margin-top:2px}
.emp-hero-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;margin-top:13px;font-size:13px;color:var(--ink-60)}
.emp-hero-meta span{display:inline-flex;align-items:center;gap:6px}
.emp-hero-acts{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.emp-site{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent)}
.emp-site:hover{filter:brightness(.9)}
.emp-grid{display:grid;grid-template-columns:1fr 320px;gap:34px;align-items:start;margin-top:26px}
.emp-main{display:flex;flex-direction:column;gap:30px;min-width:0}
.emp-section h2{font-size:22px;font-weight:600;margin-bottom:14px}
.emp-sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
.emp-sec-head h2{margin-bottom:0}
.emp-sec-edit{font-size:13px}
/* vídeo */
.emp-video-frame{position:relative;aspect-ratio:16/9;border-radius:13px;overflow:hidden;background:#000;border:1px solid var(--line)}
.emp-video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.emp-video-remove{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-60);margin-top:11px}
.emp-video-remove:hover{color:var(--ink)}
.emp-video-add{display:flex;gap:20px;align-items:center;background:#fcfbf9;border:1px solid var(--line);border-radius:13px;padding:22px}
.emp-video-ph{flex-shrink:0;width:128px;aspect-ratio:16/11;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:var(--ink-40);background:repeating-linear-gradient(45deg,#f2f0ea,#f2f0ea 9px,#edeae3 9px,#edeae3 18px);border:1px solid var(--line)}
.emp-video-ph span{font-family:var(--mono);font-size:10.5px;background:rgba(255,255,255,.75);padding:2px 7px;border-radius:5px}
.emp-video-add-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.emp-video-add-body strong{font-size:16px}
.emp-video-add-body p{font-size:13.5px;color:var(--ink-60);line-height:1.5;max-width:54ch}
.emp-video-input{display:flex;gap:9px;margin-top:5px;flex-wrap:wrap}
.emp-video-input input{flex:1;min-width:220px;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;transition:.15s;font-size:14px}
.emp-video-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.emp-video-err{font-size:12.5px;color:#b3261e}
/* sobre */
.emp-about{font-size:15.5px;line-height:1.6;color:var(--ink-80);max-width:64ch}
.emp-destaques{display:flex;flex-direction:column;gap:9px;margin-top:16px}
.emp-destaques li{display:flex;align-items:flex-start;gap:9px;font-size:14.5px;color:var(--ink-80)}
.emp-destaques svg{color:var(--accent);flex-shrink:0;margin-top:3px}
/* pubs */
.emp-pubs{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:#fff}
.emp-pub{text-align:left;display:flex;flex-direction:column;gap:3px;padding:15px 18px;border-bottom:1px solid var(--line-2);transition:.14s}
.emp-pub:last-child{border-bottom:none}
.emp-pub:hover{background:#fcfbf9}
.emp-pub-title{font-family:var(--display);font-size:16.5px;font-weight:600;line-height:1.25;color:var(--ink)}
.emp-pub:hover .emp-pub-title{color:var(--accent)}
/* sidebar */
.emp-aside{display:flex;flex-direction:column;gap:16px;position:sticky;top:88px}
.emp-facts{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.emp-facts h3{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-40);margin-bottom:6px}
.emp-facts dl{display:flex;flex-direction:column}
.emp-facts dl>div{display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:11px 0;border-top:1px solid var(--line-2)}
.emp-facts dt{font-size:13px;color:var(--ink-60);flex-shrink:0}
.emp-facts dd{font-size:13.5px;font-weight:600;text-align:right}
.emp-cta-card{background:var(--ink);color:#fff;border-radius:var(--r);padding:22px}
.emp-cta-card h3{color:#fff;font-size:18px;font-weight:600;margin-bottom:8px}
.emp-cta-card p{font-size:13.5px;color:rgba(255,255,255,.74);margin-bottom:16px;line-height:1.5}

/* ---------- Painel: configuração da página institucional ---------- */
.emp-cfg{display:flex;flex-direction:column;gap:16px;max-width:760px}
.emp-cfg-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:4px}
.emp-cfg-head h2{font-size:24px;font-weight:600;margin-top:3px}
.emp-cfg-head p{font-size:14px;color:var(--ink-60);margin-top:4px;max-width:52ch}
.emp-cfg-card{display:flex;flex-direction:column;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.emp-cfg-card .arf-config{border-left:3px solid var(--accent)}
.emp-cfg-preview{display:flex;flex-direction:column;gap:9px}
.emp-cfg-preview .emp-video-frame{max-width:420px}
.emp-cfg-ok{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--accent)}
.emp-cfg-off{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-60);background:var(--line-2);border-radius:9px;padding:11px 13px}
.emp-cfg-actions{align-items:center;gap:14px}
.emp-cfg-actions .btn{flex:0 0 auto}
.emp-cfg-saved{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:var(--accent)}

/* ---------- Company content panel ---------- */
.cc-wrap{display:flex;flex-direction:column;gap:18px}
.cc-intro{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.cc-intro h3{font-size:21px;font-weight:600}
.cc-intro p{font-size:14.5px;color:var(--ink-60);max-width:54ch;margin-top:5px;line-height:1.5}
.cc-sent{display:flex;align-items:center;gap:10px;background:var(--accent-glow);color:var(--accent);font-weight:600;font-size:14px;padding:13px 16px;border-radius:11px}
.cc-form{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px}
.cc-form-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.cc-form-head h4{font-family:var(--display);font-size:18px;font-weight:600}
.cc-flow{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 10%,#fff);padding:5px 11px;border-radius:100px}
.cc-upload{display:flex;align-items:center;gap:9px;padding:14px;border:1px dashed var(--line);border-radius:9px;color:var(--ink-60);font-size:13.5px;cursor:pointer}
.cc-upload:hover{border-color:var(--accent)}
.cc-list{display:flex;flex-direction:column;gap:12px}
.cc-empty{font-size:14px;color:var(--ink-40);padding:8px 0}
.cc-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.cc-item-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:5px}
.cc-item strong{display:block;font-family:var(--display);font-size:17px;font-weight:600;line-height:1.2}
.cc-item-meta{font-size:12.5px;color:var(--ink-60);margin-top:4px;display:block}
.pub-st{font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:100px;white-space:nowrap}
.pub-st.ok{background:var(--accent-glow);color:var(--accent)}
.pub-st.warn{background:color-mix(in oklab,var(--accent-2) 13%,#fff);color:var(--accent-2)}
