.pub-st.bad{background:#fbeaea;color:#b3261e}
.cc-reject{display:flex;align-items:flex-start;gap:8px;margin-top:10px;padding:11px 13px;background:#fbeaea;border-radius:9px;font-size:13px;color:#8a2018;line-height:1.45}
.cc-reject svg{flex-shrink:0;margin-top:2px;color:#b3261e}

/* modal full (cadastro empresa) */
.adm-modal-full{max-width:780px;max-height:90vh;overflow-y:auto;scrollbar-width:thin}
.adm-modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}
.adm-modal-header h3{font-size:22px;font-weight:600;margin:0 0 4px}
.adm-modal-header p{font-size:13.5px;color:var(--ink-60);margin:0}
.cad-section{border-top:1px solid var(--line-2);padding-top:20px;margin-bottom:20px}
.cad-sec-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin:0 0 14px}
.adm-cad-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.adm-cad-grid3 .field,.adm-cad-grid3 input,.adm-cad-grid3 select{display:flex;flex-direction:column;gap:5px}
.adm-cad-grid3 input,.adm-cad-grid3 select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;transition:.14s;width:100%;box-sizing:border-box}
.adm-cad-grid3 input:focus,.adm-cad-grid3 select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
/* logo drop */
.logo-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--line);border-radius:12px;padding:28px 20px;cursor:pointer;transition:.16s;color:var(--ink-40);text-align:center;background:#fcfbf9;min-height:110px}
.logo-drop span{font-size:13.5px;font-weight:600;color:var(--ink-60)}
.logo-drop small{font-size:11px;color:var(--ink-40)}
.logo-drop.drag{border-color:var(--accent);background:var(--accent-glow)}
.logo-drop.has-img{border-style:solid;border-color:var(--accent);background:#fff;padding:12px}
.logo-preview{max-height:80px;max-width:200px;object-fit:contain;border-radius:6px}

/* --- Aprovações --- */
.adm-aprov-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.adm-aprov-head h2{font-size:20px;font-weight:600;margin:0 0 4px}
.adm-aprov-head p{font-size:13.5px;color:var(--ink-60);margin:0}
.adm-aprov-list{display:flex;flex-direction:column;gap:12px;margin-bottom:8px}
.adm-aprov-card{display:flex;align-items:flex-start;gap:20px;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
.adm-aprov-body{flex:1;min-width:0}
.adm-aprov-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.adm-aprov-row strong{font-size:15.5px}
.adm-aprov-meta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:12.5px;color:var(--ink-60)}
.adm-aprov-meta span{display:inline-flex;align-items:center;gap:5px}
.adm-aprov-acts{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.adm-aprov-acts .btn{white-space:nowrap}
.adm-empty{display:flex;align-items:center;gap:10px;padding:24px 20px;font-size:14px;color:var(--accent);background:var(--accent-glow);border-radius:var(--r);margin-bottom:16px}
/* modal wide */
.adm-modal-wide{max-width:640px}
.adm-cad-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.adm-cad-grid .field{display:flex;flex-direction:column;gap:5px}
.adm-cad-grid input,.adm-cad-grid select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;transition:.14s}
.adm-cad-grid input:focus,.adm-cad-grid select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
/* pkg btn colors in modal */
.adm-pkg-btn-0.on{border-color:#1a4dcc!important;background:#e8f0fe!important;color:#1a4dcc!important}
.adm-pkg-btn-1.on{border-color:var(--accent)!important;background:var(--accent-glow)!important;color:var(--accent)!important}
.adm-pkg-btn-2.on{border-color:var(--accent-2)!important;background:color-mix(in oklab,var(--accent-2) 12%,#fff)!important;color:var(--accent-2)!important}

/* ---------- IA cria vaga ---------- */
.iav-box{background:linear-gradient(135deg,var(--ink),#1f2933);color:#fff;border-radius:14px;padding:24px;margin-bottom:24px}
.iav-head{margin-bottom:16px}
.iav-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:color-mix(in oklab,var(--accent) 18%,transparent);padding:5px 11px;border-radius:100px;margin-bottom:12px}
.iav-head h3{color:#fff;font-size:21px;line-height:1.2;margin-bottom:6px}
.iav-head p{color:rgba(255,255,255,.7);font-size:13.5px;line-height:1.5;max-width:58ch}
.iav-input-row{display:flex;gap:10px;align-items:stretch}
.iav-input-row textarea{flex:1;padding:13px 15px;border:1px solid rgba(255,255,255,.18);border-radius:11px;background:rgba(255,255,255,.07);color:#fff;font-size:15px;font-family:inherit;resize:none;outline:none;transition:.15s;line-height:1.45}
.iav-input-row textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.1)}
.iav-input-row textarea::placeholder{color:rgba(255,255,255,.45)}
.iav-gen{display:flex;align-items:center;justify-content:center;gap:8px;min-width:150px;background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;padding:0 20px;border-radius:11px;cursor:pointer;transition:.15s;white-space:nowrap}
.iav-gen:hover{filter:brightness(1.1)}
.iav-gen:disabled{opacity:.5;cursor:not-allowed;filter:none}
.iav-dots{display:inline-flex;gap:4px}
.iav-dots span{width:7px;height:7px;border-radius:50%;background:#fff;animation:iavb 1s infinite ease-in-out}
.iav-dots span:nth-child(2){animation-delay:.16s}
.iav-dots span:nth-child(3){animation-delay:.32s}
@keyframes iavb{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.iav-examples{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}
.iav-examples>span{font-size:12.5px;color:rgba(255,255,255,.5)}
.iav-examples button{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.85);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:6px 12px;border-radius:100px;cursor:pointer;transition:.14s}
.iav-examples button:hover{background:rgba(255,255,255,.16);border-color:var(--accent)}
.iav-result-flag{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-glow);border:1px solid color-mix(in oklab,var(--accent) 28%,var(--line));border-radius:10px;padding:11px 14px;margin-bottom:20px}
.iav-section{margin-bottom:20px}
.iav-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.iav-tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 12%,#fff);padding:3px 9px;border-radius:100px}
.iav-list{display:flex;flex-direction:column;gap:8px}
.iav-list-row{display:flex;align-items:center;gap:10px}
.iav-list-row>svg{color:var(--accent);flex-shrink:0}
.iav-qn{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--accent-glow);color:var(--accent);font-size:12px;font-weight:700;flex-shrink:0}
.iav-list-row input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;outline:none;background:#fff;transition:.14s}
.iav-list-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.iav-del{display:grid;place-items:center;width:30px;height:30px;border-radius:7px;color:var(--ink-40);flex-shrink:0;cursor:pointer;transition:.14s}
.iav-del:hover{background:#fbeaea;color:#b3261e}
.iav-add{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);padding:7px 12px;border:1px dashed color-mix(in oklab,var(--accent) 40%,var(--line));border-radius:8px;cursor:pointer;transition:.14s;margin-top:2px}
.iav-add:hover{background:var(--accent-glow)}
.iav-anuncio{position:relative}
.iav-anuncio textarea{width:100%;box-sizing:border-box;padding:16px;border:1px solid var(--line);border-radius:11px;font-size:13.5px;line-height:1.6;font-family:inherit;background:#fcfbf9;resize:vertical;outline:none;transition:.14s;white-space:pre-wrap}
.iav-anuncio textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.iav-copy{position:absolute;top:12px;right:12px;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-80);background:#fff;border:1px solid var(--line);padding:6px 11px;border-radius:8px;cursor:pointer;transition:.14s}
.iav-copy:hover{border-color:var(--accent);color:var(--accent)}

/* ---------- Tribuna do Talento ---------- */
.tribuna .content-masthead{max-width:760px}
/* como funciona */
.trib-how{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.trib-how-step{position:relative;display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.trib-how-n{position:absolute;top:14px;right:16px;font-family:var(--display);font-size:13px;font-weight:700;color:var(--ink-40)}
.trib-how-ic{display:grid;place-items:center;width:42px;height:42px;border-radius:11px;background:var(--accent-glow);color:var(--accent);flex-shrink:0}
.trib-how-step strong{display:block;font-size:15.5px;margin-bottom:3px}
.trib-how-step p{font-size:13px;color:var(--ink-60);line-height:1.45}
/* feature */
.trib-feature{display:grid;grid-template-columns:1.1fr 1fr;gap:0;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.18s;margin-bottom:36px}
.trib-feature:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.trib-feature-media{position:relative}
.trib-feature-media .ph{height:100%}
.trib-feature-flag{position:absolute;top:14px;left:14px;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--accent-2);padding:5px 11px;border-radius:100px;white-space:nowrap}
.trib-feature-body{padding:30px 32px;display:flex;flex-direction:column;justify-content:center}
.trib-feature-body h2{font-size:27px;margin:8px 0 12px;line-height:1.12}
.trib-feature-body>p{font-size:15px;color:var(--ink-60);line-height:1.55;margin-bottom:20px}
.trib-feature-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-top:18px;border-top:1px solid var(--line-2)}
/* tipo + viral chips */
.trib-tipo{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.trib-viral{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 12%,#fff);padding:3px 9px;border-radius:100px}
.trib-viral svg{fill:var(--accent-2);stroke:var(--accent-2)}
/* author */
.trib-author{display:flex;align-items:center;gap:11px;min-width:0}
.trib-ava{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),color-mix(in oklab,var(--accent) 60%,var(--accent-2)));color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.trib-ava.lg{width:46px;height:46px;font-size:15px}
.trib-ava.xl{width:64px;height:64px;font-size:21px}
.trib-author-info{min-width:0}
.trib-author-info strong{display:flex;align-items:center;gap:6px;font-size:14px;line-height:1.2}
.trib-author-info span{font-size:12.5px;color:var(--ink-60)}
.trib-open-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 0 3px var(--accent-glow)}
/* metrics */
.trib-metrics{display:flex;align-items:center;gap:15px;font-size:13.5px;font-weight:600;color:var(--ink-60);flex-shrink:0}
.trib-metrics.compact{gap:11px;font-size:12.5px}
.trib-metrics span{display:inline-flex;align-items:center;gap:5px}
.trib-metrics svg{color:var(--ink-40)}
/* filters */
.trib-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
/* grid */
.trib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.trib-card{display:flex;flex-direction:column;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;cursor:pointer;transition:.16s}
.trib-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:color-mix(in oklab,var(--accent) 25%,var(--line))}
.trib-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.trib-card-title{font-size:18px;line-height:1.2}
.trib-card:hover .trib-card-title{color:var(--accent)}
.trib-card-lead{font-size:13.5px;color:var(--ink-60);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.trib-card-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto;padding-top:14px;border-top:1px solid var(--line-2)}
.trib-radar{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:6px 11px;border-radius:8px;margin-top:2px}
/* cta card */
.trib-cta-card{display:flex;flex-direction:column;align-items:flex-start;gap:10px;background:var(--ink);color:#fff;border-radius:var(--r);padding:26px}
.trib-cta-ic{display:grid;place-items:center;width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.12);color:#fff}
.trib-cta-card h3{color:#fff;font-size:20px;line-height:1.15}
.trib-cta-card p{font-size:13.5px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:6px}
/* post detail */
.trib-post-grid{display:grid;grid-template-columns:1fr 320px;gap:44px;align-items:start;margin-top:8px}
.trib-post-main>h1{font-size:clamp(28px,3.6vw,40px);margin:10px 0 14px;letter-spacing:-.015em}
.trib-post-byline{display:flex;align-items:center;gap:12px;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:24px}
.trib-post-share{margin-left:auto}
.trib-viral-banner{display:flex;align-items:flex-start;gap:13px;background:color-mix(in oklab,var(--accent-2) 9%,#fff);border:1px solid color-mix(in oklab,var(--accent-2) 28%,#fff);border-left:4px solid var(--accent-2);border-radius:var(--r);padding:16px 18px;margin-bottom:24px}
.trib-viral-banner svg{color:var(--accent-2);fill:var(--accent-2);flex-shrink:0;margin-top:1px}
.trib-viral-banner p{font-size:14px;color:var(--ink-80);line-height:1.5}
.trib-post-text{margin-top:24px}
.trib-post-reactions{display:flex;align-items:center;gap:14px;margin-top:30px;padding-top:22px;border-top:1px solid var(--line)}
.trib-react{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--ink-60);border:1px solid var(--line);border-radius:100px;padding:8px 16px;cursor:pointer;transition:.14s}
.trib-react:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-glow)}
.trib-react-views{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-40);margin-left:auto}
/* post aside */
.trib-post-aside{position:sticky;top:90px;display:flex;flex-direction:column;gap:20px}
.trib-profile-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 22px}
.trib-profile-name{font-family:var(--display);font-size:19px;font-weight:600;line-height:1.2;margin-top:4px}
.trib-profile-cargo{font-size:13.5px;color:var(--ink-60)}
.trib-radar.solo{margin:4px 0}
.trib-open-badge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--accent);background:var(--accent-glow);padding:6px 13px;border-radius:100px}
.trib-closed-badge{font-size:12.5px;font-weight:600;color:var(--ink-60);background:var(--line-2);padding:6px 13px;border-radius:100px}
.trib-profile-stats{display:flex;justify-content:space-between;gap:6px;width:100%;margin:16px 0 6px;padding:16px 0;border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2)}
.trib-profile-stats div{display:flex;flex-direction:column;gap:1px;flex:1}
.trib-profile-stats strong{font-family:var(--display);font-size:19px;font-weight:700;line-height:1}
.trib-profile-stats span{font-size:11.5px;color:var(--ink-60)}
.trib-profile-card .btn{margin-top:8px}
.trib-recruiter-note{font-size:12px;color:var(--ink-60);line-height:1.45;font-style:italic;font-family:var(--display);margin-top:10px}
.trib-related{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
.trib-related-title{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-40);margin-bottom:14px}

/* ---------- WhatsApp modal & retorno ---------- */
.wa-chip{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:11.5px;font-weight:600;color:#128C7E;background:#e7f7ee;border:1px solid #bfe8d2;border-radius:100px;padding:3px 9px;cursor:pointer;transition:.14s}
.wa-chip:hover{background:#d6f0e1}
.wa-chip svg{color:#25D366}
.wa-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:300;display:flex;align-items:center;gap:9px;background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:12px 18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.22);animation:waToastIn .2s ease}
.wa-toast svg{color:#25D366;flex-shrink:0}
@keyframes waToastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translateX(-50%)}}
.wa-modal{position:fixed;inset:0;z-index:280;background:rgba(0,0,0,.5);display:grid;place-items:center;padding:24px;animation:shareIn .16s ease}
.wa-card{width:100%;max-width:420px;background:#ECE5DD;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.28);animation:waCardIn .2s ease}
@keyframes waCardIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.wa-head{display:flex;align-items:center;gap:12px;background:#075E54;color:#fff;padding:14px 16px}
.wa-ava{display:grid;place-items:center;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);font-size:14px;font-weight:700;flex-shrink:0}
.wa-head-info{flex:1;min-width:0}
.wa-head-info strong{display:block;font-size:15px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wa-head-info span{font-size:12px;color:rgba(255,255,255,.75);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.wa-close{flex-shrink:0;width:30px;height:30px;display:grid;place-items:center;font-size:24px;line-height:1;color:rgba(255,255,255,.8);border-radius:50%;cursor:pointer;transition:.14s}
.wa-close:hover{background:rgba(255,255,255,.15);color:#fff}
.wa-body{padding:20px 18px;background-image:radial-gradient(circle at 20% 30%,rgba(255,255,255,.4) 0,transparent 60%);min-height:120px}
.wa-bubble{position:relative;background:#DCF8C6;color:#111b21;font-size:14px;line-height:1.5;padding:10px 13px 20px;border-radius:10px 10px 10px 2px;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.1);max-width:95%}
.wa-time{position:absolute;right:10px;bottom:5px;font-size:10.5px;color:#54776a}
.wa-edit-link{display:inline-block;margin-top:14px;font-size:13px}
.wa-edit textarea{width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;line-height:1.5;resize:vertical;outline:none;background:#fff;transition:.14s}
.wa-edit textarea:focus{border-color:#25D366;box-shadow:0 0 0 3px rgba(37,211,102,.18)}
.wa-hint{font-size:12px;color:var(--ink-60);margin:10px 0 0}
.wa-hint code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11.5px;color:var(--accent-2)}
.wa-edit-acts{display:flex;align-items:center;gap:14px;margin-top:14px}

/* ---------- Admin panel ---------- */
.adm-dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px}
.adm-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.adm-card-title{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-40);margin:0 0 16px}
.adm-dist-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.adm-plan-pip{font-size:12px;font-weight:700;width:90px;flex-shrink:0;padding:2px 0}
.adm-dist-bar{flex:1;height:8px;background:var(--line-2);border-radius:100px;overflow:hidden}
.adm-dist-bar span{display:block;height:100%;border-radius:100px;background:var(--accent)}
.adm-dist-n{font-size:12px;font-weight:600;color:var(--ink-60);width:76px;text-align:right;flex-shrink:0}
.adm-cont-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line-2)}
.adm-cont-row:last-child{border-bottom:none}
.adm-cont-title{font-size:13px;color:var(--ink-80);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
/* plan colors */
.adm-pp-0{color:#1a4dcc!important}
.adm-pp-1{color:var(--accent)!important}
.adm-pp-2{color:var(--accent-2)!important}
.adm-bar-fill-0{background:#1a4dcc!important}
.adm-bar-fill-1{background:var(--accent)!important}
.adm-bar-fill-2{background:var(--accent-2)!important}
/* users table */
.adm-users-table{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.adm-ut-head,.adm-ut-row{display:grid;grid-template-columns:2fr 1.2fr 1fr .6fr .8fr 1.4fr;gap:12px;padding:13px 18px;align-items:center}
.adm-ut-head{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-40);background:#fcfbf9;border-bottom:1px solid var(--line)}
.adm-ut-row{border-bottom:1px solid var(--line-2);transition:.14s}
.adm-ut-row:last-child{border-bottom:none}
.adm-ut-row.blocked{opacity:.55;background:#fcfbf9}
.adm-ut-co{display:flex;align-items:center;gap:10px;min-width:0}
.adm-ut-co strong{display:block;font-size:14px}
.adm-ut-setor{font-size:12.5px;color:var(--ink-60)}
.adm-ut-n{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600}
.adm-ut-acts{display:flex;gap:7px;flex-wrap:wrap}
.adm-plan-sel{padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-weight:600;background:#fff;outline:none;cursor:pointer;transition:.14s;max-width:100%}
.adm-plan-sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
/* content filters */
.adm-cont-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
/* reject modal */
.adm-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:grid;place-items:center;padding:24px}
.adm-modal{background:#fff;border-radius:16px;padding:28px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.adm-modal h3{font-size:20px;font-weight:600;margin:0 0 6px}
.adm-modal p{font-size:13.5px;color:var(--ink-60);margin:0 0 16px;line-height:1.5}
.adm-textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;outline:none;transition:.15s;box-sizing:border-box}
.adm-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.adm-modal-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
/* feature matrix */
.adm-pkg-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.adm-pkg-head h2{font-size:24px;font-weight:600;margin:0 0 6px}
.adm-pkg-head p{font-size:14px;color:var(--ink-60);margin:0}
.adm-feat-table{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.adm-feat-head{display:grid;grid-template-columns:1fr repeat(3,130px);padding:14px 20px;background:#fcfbf9;border-bottom:1px solid var(--line);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-40)}
.adm-plan-head{text-align:center}
.adm-feat-group{padding:10px 20px;background:var(--line-2);font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);border-bottom:1px solid var(--line)}
.adm-feat-row{display:grid;grid-template-columns:1fr repeat(3,130px);padding:11px 20px;border-bottom:1px solid var(--line-2);align-items:center}
.adm-feat-row:last-child{border-bottom:none}
.adm-feat-label{font-size:14px;color:var(--ink-80)}
.adm-feat-cell{display:flex;justify-content:center}
.adm-toggle{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);background:#fff;cursor:pointer;transition:.14s;color:var(--ink-40)}
.adm-toggle-0.on{background:#e8f0fe;border-color:#1a4dcc;color:#1a4dcc}
.adm-toggle-1.on{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
.adm-toggle-2.on{background:color-mix(in oklab,var(--accent-2) 12%,#fff);border-color:var(--accent-2);color:var(--accent-2)}

/* ---------- Admin moderation ---------- */
.admin-bar{background:#0f1012;color:#fff}
.admin-bar-inner{max-width:var(--maxw);margin:0 auto;padding:11px 24px;display:flex;align-items:center;justify-content:space-between}
.admin-role{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.04em;color:#fff}
.admin-role svg{color:var(--accent)}
.admin-bar .link{color:rgba(255,255,255,.7)}
.admin.panel{padding-top:0}
.admin .panel-head{margin-top:30px}
.tab-count{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:100px;background:var(--accent);color:#fff;font-size:10.5px;font-weight:800;margin-left:5px;vertical-align:middle}
.mod-list{display:flex;flex-direction:column;gap:16px}
.mod-card{display:grid;grid-template-columns:180px 1fr 220px;gap:22px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;align-items:start}
.mod-preview .ph{height:100%}
.mod-body{min-width:0}
.mod-co{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:8px}
.mod-co strong{font-size:14.5px}
.mod-cat{font-size:11.5px;font-weight:700;color:var(--ink-60);background:var(--line-2);padding:4px 10px;border-radius:100px;margin-left:auto}
.mod-body h3{font-size:21px;font-weight:600;margin:4px 0 7px;line-height:1.18}
.mod-body p{font-size:14.5px;color:var(--ink-80);line-height:1.5;max-width:60ch}
.mod-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.mod-actions .btn{width:100%}
.mod-prev{text-align:center;font-size:13px;margin-top:2px}
.btn-bad{background:#b3261e;color:#fff}
.btn-bad:hover{filter:brightness(1.08)}
.mod-reject-box{display:flex;flex-direction:column;gap:9px}
.mod-reject-box textarea{padding:10px 12px;border:1px solid var(--line);border-radius:9px;outline:none;font-size:13.5px;resize:vertical;font-family:inherit}
.mod-reject-box textarea:focus{border-color:#b3261e}
.mrb-acts{display:flex;gap:8px}
.mrb-acts .btn{flex:1}

.vt-st.canceled{background:#fbeaea;color:#b3261e}
.vt-row-canceled{opacity:.6}
.vt-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:130px}
.vt-btn-cand{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;white-space:nowrap;width:130px;box-sizing:border-box}
.vt-btn-cancel{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;white-space:nowrap;width:130px;box-sizing:border-box;background:transparent;border:1px solid color-mix(in oklab,#b3261e 30%,var(--line));color:#b3261e;border-radius:8px;padding:5px 11px;cursor:pointer;font-weight:600;transition:.14s}
.vt-btn-cancel:hover{background:#fbeaea;border-color:#b3261e}
.prazo-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px;white-space:nowrap}
.prazo-ok{background:var(--accent-glow);color:var(--accent)}
.prazo-warn{background:color-mix(in oklab,var(--accent-2) 12%,#fff);color:var(--accent-2)}
.prazo-urgent{background:#fbeaea;color:#b3261e}
.prazo-expired{background:var(--line-2);color:var(--ink-40)}

/* ---------- Alerta vencimento ---------- */
.alerta-venc{display:flex;gap:14px;background:color-mix(in oklab,var(--accent-2) 9%,#fff);border:1px solid color-mix(in oklab,var(--accent-2) 30%,#fff);border-left:4px solid var(--accent-2);border-radius:var(--r);padding:18px 20px;margin-bottom:20px}
.av-icon{color:var(--accent-2);flex-shrink:0;margin-top:2px}
.av-body{flex:1;min-width:0}
.av-body strong{display:block;font-size:14.5px;color:var(--ink);margin-bottom:4px}
.av-body p{font-size:13px;color:var(--ink-80);margin-bottom:12px;line-height:1.5}
.av-vagas{display:flex;flex-direction:column;gap:7px}
.av-item{display:flex;align-items:center;gap:9px;text-align:left;font-size:13px;font-weight:600;color:var(--accent-2);background:color-mix(in oklab,var(--accent-2) 7%,#fff);border:1px solid color-mix(in oklab,var(--accent-2) 22%,#fff);border-radius:9px;padding:10px 14px;cursor:pointer;transition:.14s}
.av-item:hover{background:color-mix(in oklab,var(--accent-2) 14%,#fff)}
.av-item span{margin-left:auto;font-weight:700;white-space:nowrap}
.av-close{align-self:flex-start;flex-shrink:0;display:grid;place-items:center;width:30px;height:30px;border-radius:8px;color:var(--ink-40);transition:.14s;cursor:pointer}
.av-close:hover{background:var(--line-2);color:var(--ink)}

/* ---------- Modalidade badge ---------- */
.mod-badge{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:12px}
.mod-presencial{background:#e8f0fe;color:#1a4dcc}
.mod-hibrido{background:color-mix(in oklab,var(--accent-2) 13%,#fff);color:var(--accent-2)}
.mod-remoto{background:var(--accent-glow);color:var(--accent)}
.mod-field{display:flex;flex-direction:column;gap:8px}
.mod-opt-presencial.on{border-color:#1a4dcc!important;background:#e8f0fe!important;color:#1a4dcc!important}
.mod-opt-hibrido.on{border-color:var(--accent-2)!important;background:color-mix(in oklab,var(--accent-2) 13%,#fff)!important;color:var(--accent-2)!important}
.mod-opt-remoto.on{border-color:var(--accent)!important;background:var(--accent-glow)!important;color:var(--accent)!important}

/* ---------- Share menu ---------- */
.share-wrap{position:relative;display:inline-flex}
.share-backdrop{position:fixed;inset:0;z-index:99}
.share-menu{position:absolute;bottom:calc(100% + 8px);right:0;z-index:100;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;min-width:232px;box-shadow:0 8px 32px rgba(0,0,0,.13);animation:shareIn .15s ease}
.share-menu.up{bottom:calc(100% + 8px)}
@keyframes shareIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.share-menu-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-40);margin:0 0 11px}
.share-nets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.share-net{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:.14s}
.share-net:hover{border-color:var(--sn-color,var(--accent));background:color-mix(in oklab,var(--sn-color,var(--accent)) 9%,#fff)}
.sn-icon{display:grid;place-items:center;color:var(--sn-color,var(--ink-60))}
.sn-label{font-size:10px;font-weight:700;color:var(--ink-80)}
.share-copy-row{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fcfbf9;font-size:13px;font-weight:600;color:var(--ink-80);cursor:pointer;transition:.14s}
.share-copy-row:hover{border-color:var(--ink-40);background:#f5f3ee}
.share-toast{position:absolute;bottom:calc(100% + 48px);right:0;white-space:nowrap;font-size:12px;font-weight:600;color:#fff;background:var(--ink);padding:6px 12px;border-radius:8px;z-index:102;pointer-events:none;animation:shareIn .15s ease}

/* ---------- Na Hora (Express) ---------- */
.exp-wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.exp-h2{font-size:clamp(24px,3vw,32px);font-weight:600;margin-bottom:24px;letter-spacing:-.01em}
.exp-h2.light{color:#fff}
.exp-call-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;transition:.15s;white-space:nowrap}
.exp-call-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.exp-call-btn.big{font-size:15.5px;padding:14px 24px;border-radius:12px}
.exp-call-btn.ghost{background:var(--line-2);color:var(--ink-80)}
.exp-call-btn.ghost:hover{background:var(--line);filter:none}
.exp-call-btn.light{background:#fff;color:var(--ink)}
.exp-ghost-btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:14.5px;color:#fff;padding:14px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.25);transition:.15s}
.exp-ghost-btn:hover{background:rgba(255,255,255,.1)}

/* hero */
.exp-hero{background:linear-gradient(150deg,var(--ink) 0%,#1a2a22 55%,color-mix(in oklab,var(--accent) 32%,var(--ink)) 100%);color:#fff;overflow:hidden}
.exp-hero-inner{max-width:var(--maxw);margin:0 auto;padding:66px 24px 60px}
.exp-tag{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:color-mix(in oklab,var(--accent) 55%,transparent);padding:7px 14px;border-radius:100px;margin-bottom:20px}
.exp-hero h1{color:#fff;font-size:clamp(34px,5vw,56px);line-height:1.05;margin-bottom:18px}
.exp-hero h1 em{font-style:italic;color:var(--accent);text-decoration:underline;text-decoration-color:color-mix(in oklab,var(--accent) 50%,transparent);text-underline-offset:6px}
.exp-hero>.exp-hero-inner>p{font-size:18px;color:rgba(255,255,255,.78);max-width:50ch;line-height:1.5;margin-bottom:22px}
.exp-live{display:inline-flex;align-items:center;gap:9px;font-size:14px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);padding:9px 16px;border-radius:100px;margin-bottom:28px}
.exp-live strong{color:#fff}
.exp-live-dot{width:9px;height:9px;border-radius:50%;background:#3ddc84;box-shadow:0 0 0 0 rgba(61,220,132,.6);animation:expPulse 1.8s infinite}
@keyframes expPulse{0%{box-shadow:0 0 0 0 rgba(61,220,132,.55)}70%{box-shadow:0 0 0 10px rgba(61,220,132,0)}100%{box-shadow:0 0 0 0 rgba(61,220,132,0)}}
.exp-hero-acts{display:flex;gap:12px;flex-wrap:wrap}

/* categorias */
.exp-cats-sec{padding:54px 0}
.exp-cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
.exp-cat{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;transition:.16s;display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.exp-cat:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-3px)}
.exp-cat.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.exp-cat-ic{display:grid;place-items:center;width:48px;height:48px;border-radius:12px;background:var(--accent-glow);color:var(--accent);margin-bottom:4px}
.exp-cat strong{font-size:17px;font-weight:700}
.exp-cat p{font-size:13.5px;color:var(--ink-60);line-height:1.45;flex:1}
.exp-cat-foot{font-size:12.5px;color:var(--ink-60);border-top:1px solid var(--line-2);padding-top:10px;margin-top:4px;width:100%}
.exp-cat-foot b{color:var(--ink);font-weight:700}

/* como funciona */
.exp-how{background:var(--ink);padding:56px 0}
.exp-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.exp-step{position:relative;padding-left:4px}
.exp-step-n{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:color-mix(in oklab,var(--accent) 25%,transparent);color:var(--accent);font-weight:800;font-size:17px;margin-bottom:14px;border:1.5px solid color-mix(in oklab,var(--accent) 50%,transparent)}
.exp-step strong{display:block;color:#fff;font-size:17px;font-weight:700;margin-bottom:7px}
.exp-step p{color:rgba(255,255,255,.66);font-size:14px;line-height:1.5}

/* lista de profissionais */
.exp-pros-wrap{padding:54px 0;scroll-margin-top:72px}
.exp-pros-head{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.exp-pros-head .exp-h2{margin-bottom:0}
.exp-filter{display:flex;gap:7px;flex-wrap:wrap}
.exp-filter button{font-size:13px;font-weight:600;color:var(--ink-60);background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:100px;transition:.14s}
.exp-filter button:hover{border-color:var(--accent);color:var(--accent)}
.exp-filter button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.exp-pros{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.exp-pro{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:13px;transition:.16s}
.exp-pro:hover{box-shadow:var(--shadow);border-color:var(--line)}
.exp-pro-top{display:flex;align-items:center;gap:11px}
.exp-ava{display:grid;place-items:center;width:46px;height:46px;border-radius:50%;background:color-mix(in oklab,var(--accent) 16%,#fff);color:var(--accent);font-weight:800;font-size:15px;flex-shrink:0}
.exp-ava.lg{width:58px;height:58px;font-size:19px}
.exp-pro-id{flex:1;min-width:0}
.exp-pro-id strong{display:flex;align-items:center;gap:6px;font-size:15.5px;font-weight:700}
.exp-pro-id span{display:block;font-size:13px;color:var(--ink-60)}
.exp-vchk{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;flex-shrink:0}
.exp-status{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ink-60);background:var(--line-2);padding:4px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0}
.exp-status.now{color:#1f8a5b;background:#e7f7ee}

.pc-cta{background:linear-gradient(120deg,var(--pc),#0a5b66);padding:50px 0}
.pc-cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
.pc-cta .pc-h2{max-width:20ch;margin-bottom:10px}
.pc-cta p{color:rgba(255,255,255,.9);font-size:15.5px;line-height:1.5;max-width:48ch}
.pc-cta-inner>button{flex-shrink:0}

/* modal */
.pc-modal{position:fixed;inset:0;z-index:280;background:rgba(12,52,58,.55);display:grid;place-items:center;padding:24px;animation:shareIn .16s ease}
.pc-card{width:100%;max-width:460px;background:var(--card);border-radius:18px;padding:24px;box-shadow:0 24px 60px rgba(12,52,58,.3);animation:waCardIn .2s ease;max-height:90vh;overflow:auto}
.pc-card-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
.pc-card-id{flex:1;min-width:0}
.pc-card-id strong{display:block;font-size:18px;font-weight:700;line-height:1.2}
.pc-card-id span{font-size:13.5px;color:var(--ink-60)}
.pc-x{flex-shrink:0;width:30px;height:30px;display:grid;place-items:center;font-size:24px;line-height:1;color:var(--ink-40);border-radius:50%;transition:.14s}
.pc-x:hover{background:var(--line-2);color:var(--ink)}
.pc-card .pc-seal{margin-bottom:12px}
.pc-card-desc{font-size:14.5px;color:var(--ink-80);line-height:1.55;margin-bottom:18px}
.pc-card-block{margin-bottom:16px}
.pc-card-block h4{font-size:12.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-60);margin-bottom:9px}
.pc-tags{display:flex;gap:7px;flex-wrap:wrap}
.pc-fine{text-align:center;font-size:12px;color:var(--ink-40);margin-top:11px}
.pc-done{text-align:center;padding:10px 0 4px}
.pc-done-check{display:grid;place-items:center;width:70px;height:70px;border-radius:50%;background:var(--pc-soft);color:var(--pc);margin:0 auto 18px;animation:waCardIn .3s ease}
.pc-done h3{font-size:22px;margin-bottom:10px}
.pc-done p{font-size:14.5px;color:var(--ink-60);line-height:1.55;max-width:40ch;margin:0 auto 22px}

@media(max-width:860px){
  .pc-recs{grid-template-columns:repeat(2,1fr)}
  .pc-lei-inner{grid-template-columns:1fr;gap:28px}
  .pc-hero-stats{grid-template-columns:1fr}
}

/* ---------- Recrutamento por Desafios ---------- */
.ch-screen{--ch:#4f46e5;--ch-soft:#eceafe;--ch-ink:#1b1740}
.ch-wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.ch-h2{font-size:clamp(25px,3.2vw,36px);font-weight:600;line-height:1.1;letter-spacing:-.01em;margin-bottom:26px}
.ch-h2.light{color:#fff;margin-bottom:10px}
.ch-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;border:1px solid var(--ch);color:var(--ch);background:transparent;transition:.15s}
.ch-btn:hover{background:var(--ch-soft)}
.ch-btn.primary{background:var(--ch);color:#fff;border-color:var(--ch)}
.ch-btn.primary:hover{filter:brightness(1.08);background:var(--ch)}
.ch-btn.ghost{color:#fff;border-color:rgba(255,255,255,.4)}
.ch-btn.ghost:hover{background:rgba(255,255,255,.12)}
.ch-btn.light{background:#fff;color:var(--ch-ink);border-color:#fff}
.ch-btn.light:hover{filter:brightness(.96)}
.ch-btn.big{font-size:15.5px;padding:14px 24px;border-radius:12px}
.ch-btn.full{width:100%}

/* hero */
.ch-hero{background:linear-gradient(155deg,var(--ch-ink) 0%,#2d2570 55%,var(--ch) 130%);color:#fff;position:relative;overflow:hidden}
.ch-hero::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.08) 1px,transparent 0);background-size:26px 26px;pointer-events:none}
.ch-hero-inner{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:66px 24px 60px;text-align:center;display:flex;flex-direction:column;align-items:center}
.ch-tag{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:color-mix(in oklab,var(--ch) 70%,transparent);padding:7px 14px;border-radius:100px;margin-bottom:20px}
.ch-hero h1{color:#fff;font-size:clamp(34px,5vw,56px);line-height:1.05;margin-bottom:18px;max-width:18ch}
.ch-hero-inner>p{font-size:18px;color:rgba(255,255,255,.78);max-width:56ch;line-height:1.5;margin-bottom:26px}
.ch-hero-acts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* como funciona */
.ch-how{padding:56px 0}
.ch-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.ch-step{position:relative}
.ch-step-n{display:grid;place-items:center;width:40px;height:40px;border-radius:11px;background:var(--ch-soft);color:var(--ch);font-weight:800;font-size:18px;margin-bottom:14px}
.ch-step strong{display:block;font-size:16.5px;font-weight:700;margin-bottom:7px;line-height:1.25}
.ch-step p{font-size:13.5px;color:var(--ink-60);line-height:1.5}

/* tipos */
.ch-tipos-sec{padding:0 0 56px}
.ch-tipos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ch-tipo{display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px}
.ch-tipo-ic{display:grid;place-items:center;width:42px;height:42px;border-radius:10px;background:var(--ch-soft);color:var(--ch);flex-shrink:0}
.ch-tipo-txt strong{display:block;font-size:15.5px;font-weight:700;margin-bottom:3px}
.ch-tipo-txt p{font-size:13px;color:var(--ink-60);line-height:1.4}

/* desafios abertos */
.ch-open-wrap{padding:56px 0;background:var(--paper);scroll-margin-top:72px}
.ch-open{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.ch-desafio{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:11px}
.ch-desafio:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:color-mix(in oklab,var(--ch) 35%,var(--line))}
.ch-desafio-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ch-desafio-tipo{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ch);background:var(--ch-soft);padding:4px 10px;border-radius:100px}
.ch-desafio-prazo{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink-60)}
.ch-desafio h3{font-size:18px;font-weight:700;line-height:1.2;margin:0}
.ch-desafio-emp{font-size:13px;color:var(--ink-60);font-weight:600;margin-top:-4px}
.ch-desafio-brief{font-size:13.5px;color:var(--ink-60);line-height:1.5;flex:1}
.ch-desafio-premio{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:var(--ch-ink);background:color-mix(in oklab,var(--accent-2) 14%,#fff);border:1px solid color-mix(in oklab,var(--accent-2) 30%,var(--line));padding:8px 12px;border-radius:9px}
.ch-desafio-premio svg{color:var(--accent-2);fill:var(--accent-2)}
.ch-desafio-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line-2);padding-top:13px}
.ch-desafio-part{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-60)}
.ch-desafio-cta{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--ch)}

/* cta */
.ch-cta{background:linear-gradient(120deg,var(--ch),#3b2fb5);padding:50px 0}
.ch-cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
.ch-cta p{color:rgba(255,255,255,.85);font-size:15.5px;line-height:1.5;max-width:46ch}
.ch-cta-btns{display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}

/* modal */
.ch-modal{position:fixed;inset:0;z-index:280;background:rgba(27,23,64,.6);display:grid;place-items:center;padding:24px;animation:shareIn .16s ease;overflow-y:auto}
.ch-card{position:relative;width:100%;max-width:560px;background:var(--card);border-radius:18px;padding:26px;box-shadow:0 24px 60px rgba(27,23,64,.34);animation:waCardIn .2s ease;margin:auto}
.ch-x{position:absolute;top:16px;right:16px;width:32px;height:32px;display:grid;place-items:center;font-size:24px;line-height:1;color:var(--ink-40);border-radius:50%;transition:.14s}
.ch-x:hover{background:var(--line-2);color:var(--ink)}
.ch-card-tipo{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ch);background:var(--ch-soft);padding:5px 11px;border-radius:100px}
.ch-card-title{font-size:22px;font-weight:700;line-height:1.2;margin:12px 0 4px}
.ch-card-emp{font-size:14px;color:var(--ink-60);font-weight:600}
.ch-tabs{display:flex;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:4px;margin:18px 0}
.ch-tabs button{flex:1;font-size:13.5px;font-weight:600;color:var(--ink-60);padding:9px;border-radius:8px;transition:.14s}
.ch-tabs button.on{background:var(--ch);color:#fff}
.ch-brief>p{font-size:15px;color:var(--ink-80);line-height:1.6;margin-bottom:18px}
.ch-brief-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ch-brief-meta div{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px}
.ch-brief-meta span{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-40);margin-bottom:5px}
.ch-brief-meta strong{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.3}
.ch-skills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.ch-skills span{font-size:12px;font-weight:600;color:var(--ink-60);background:var(--line-2);padding:5px 11px;border-radius:100px}
.ch-fine{text-align:center;font-size:12px;color:var(--ink-40);margin-top:11px;line-height:1.4}
/* ranking */
.ch-rank-note{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;color:var(--ch-ink);background:var(--ch-soft);border-radius:10px;padding:11px 13px;margin-bottom:16px;line-height:1.45}
.ch-rank-note svg{color:var(--ch);flex-shrink:0;margin-top:1px}
.ch-rank-row{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px}
.ch-rank-row.top{border-color:var(--ch);background:color-mix(in oklab,var(--ch) 5%,#fff);box-shadow:0 0 0 1px var(--ch)}
.ch-rank-pos{font-family:var(--display);font-size:18px;font-weight:700;color:var(--ch);width:26px;flex-shrink:0;text-align:center;padding-top:8px}
.ch-rank-ava{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:var(--ch-soft);color:var(--ch);font-weight:800;font-size:14px;flex-shrink:0}
.ch-rank-main{flex:1;min-width:0}
.ch-rank-id{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:8px}
.ch-rank-id strong{font-size:15px;font-weight:700}
.ch-rank-flag{font-size:11.5px;font-weight:600;color:var(--ch);background:var(--ch-soft);padding:2px 8px;border-radius:100px}
.ch-rank-dims{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.ch-dim{display:flex;align-items:center;gap:9px;font-size:11.5px}
.ch-dim i{font-style:normal;color:var(--ink-60);width:104px;flex-shrink:0}
.ch-dim-bar{flex:1;height:6px;background:var(--line-2);border-radius:100px;overflow:hidden}
.ch-dim-bar span{display:block;height:100%;background:var(--ch);border-radius:100px}
.ch-dim b{width:24px;text-align:right;font-weight:700;color:var(--ink-80)}
.ch-rank-nota{font-size:13px;font-style:italic;color:var(--ink-60);line-height:1.4}
.ch-rank-score{text-align:center;flex-shrink:0;padding-left:4px}
.ch-rank-score strong{display:block;font-family:var(--display);font-size:26px;font-weight:700;color:var(--ch);line-height:1}
.ch-rank-score span{font-size:10px;color:var(--ink-40);text-transform:uppercase;letter-spacing:.04em}

/* ---------- Responsive ---------- */
@media(max-width:1120px){
  .nav-links,.nav-cta{display:none}
}
@media(max-width:980px){
  .hero{grid-template-columns:1fr;gap:28px;padding-top:36px}
  .results-wrap,.detail-grid,.panel-cols{grid-template-columns:1fr}
  .detail-aside{position:static}
  .auth-split{grid-template-columns:1fr}
  .auth-aside{display:none}
  .plans,.pacotes-foot,.art-grid,.kpi-row{grid-template-columns:1fr 1fr}
  .feature-art{grid-template-columns:1fr}
  .feature-art .ph{border-right:none;border-bottom:1px solid var(--line)}
  .feature-img{min-height:200px;border-right:none;border-bottom:1px solid var(--line)}
  .alc-channels{grid-template-columns:1fr 1fr}
  .alc-reach-banner{flex-direction:column;align-items:flex-start;gap:20px}
  .arb-div{display:none}
  .alc-panel-grid{grid-template-columns:1fr}
  .tr-grid{grid-template-columns:1fr 1fr}
  .tr-intro{grid-template-columns:1fr}
  .trib-how{grid-template-columns:1fr}
  .trib-grid{grid-template-columns:1fr 1fr}
  .trib-feature{grid-template-columns:1fr}
  .trib-feature-media .ph{border-bottom:1px solid var(--line)}
  .trib-post-grid{grid-template-columns:1fr}
  .trib-post-aside{position:static}
  .mod-card{grid-template-columns:1fr;gap:14px}
  .mod-preview{display:none}
}
@media(max-width:640px){
  .searchbar{flex-direction:column}
  .job-grid.regular{grid-template-columns:1fr}
  .trib-grid{grid-template-columns:1fr}
  .plans,.pacotes-foot,.art-grid,.kpi-row,.grid-2{grid-template-columns:1fr}
  .exp-steps{grid-template-columns:1fr;gap:18px}
  .exp-cta-inner{flex-direction:column;align-items:flex-start}
  .exp-hero-acts{flex-direction:column;align-items:stretch}
  .exp-hero-acts button{width:100%}
  .sr-hero-stats{grid-template-columns:1fr}
  .sr-modos{grid-template-columns:1fr 1fr}
  .sr-why-inner{grid-template-columns:1fr;gap:28px}
  .sr-cta-inner{flex-direction:column;align-items:flex-start}
  .sr-hero-acts{flex-direction:column;align-items:stretch;width:100%}
  .sr-hero-acts button{width:100%}
  .ch-steps{grid-template-columns:1fr 1fr}
  .ch-tipos{grid-template-columns:1fr}
  .ch-brief-meta{grid-template-columns:1fr}
  .ch-cta-inner{flex-direction:column;align-items:flex-start}
  .ch-hero-acts{flex-direction:column;align-items:stretch;width:100%}
  .ch-hero-acts button{width:100%}
  .ch-rank-row{flex-wrap:wrap}
  .alc-channels{grid-template-columns:1fr}
  .alc-tier-row{flex-wrap:wrap;gap:8px}
  .atr-val{width:100%;text-align:left}
  .auth-form{padding:28px 22px}
  .vt-head{display:none}
  .vt-row{grid-template-columns:1fr auto;gap:8px}
  .vt-bar,.vt-row .link{display:none}
  .footer-inner{grid-template-columns:1fr;gap:28px}
  .footer-cols{grid-template-columns:1fr 1fr}
  .njads-go{display:none}
  .tr-grid{grid-template-columns:1fr}
}
